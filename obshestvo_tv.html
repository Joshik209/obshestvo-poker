<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@400;500;600&display=swap">
<title>Общество — TV</title>
<style>
:root {
  --dark: #1C1208;
  --dark2: #251A0A;
  --dark3: #2E2010;
  --gold: #C9A96E;
  --gold2: #E8D5A3;
  --gold3: #A07840;
  --bordeaux: #6B1F2A;
  --bordeaux2: #8B2535;
  --beige: #F5EDD8;
  --text: #F0E6D0;
  --text2: #C4AA80;
  --text3: #8A7060;
  --green: #1A5C35;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--dark); font-family:'Montserrat',sans-serif; color:var(--text); overflow:hidden; height:100vh; width:100vw; }

/* ── LITE MODE: kills animations, blur, shadows ── */
body.lite * { animation:none !important; transition:none !important; }
body.lite .tv-blinds-big,
body.lite .tv-timer-big,
body.lite .tv-final-text,
body.lite .tv-break-title,
body.lite .tv-final-title { text-shadow:none !important; }
body.lite .tv-header { background:var(--dark) !important; }
body.lite #tv-seating { background:none !important; }
#lite-btn.active { color:var(--gold); border-color:var(--gold3); }

/* HEADER */
.tv-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 28px;
  background:linear-gradient(180deg,#0D0804,var(--dark));
  border-bottom:1px solid var(--gold3);
  height:64px;
}
.tv-logo { font-family:'Cormorant Garamond',serif; font-size:28px; color:var(--gold2); font-weight:700; letter-spacing:6px; }
.tv-clock { font-family:'Cormorant Garamond',serif; font-size:28px; color:var(--text2); letter-spacing:2px; }
.tv-tabs { display:flex; gap:0; }
.tv-tab { padding:8px 20px; font-size:11px; letter-spacing:3px; color:var(--text3); cursor:pointer; border:none; background:none; font-family:'Montserrat',sans-serif; border-bottom:2px solid transparent; transition:all 0.2s; }
.tv-tab.active { color:var(--gold); border-bottom-color:var(--gold); }

/* MAIN AREA */
.tv-main { height:calc(100vh - 64px); overflow:hidden; position:relative; display:flex; flex-direction:column; }
.tv-screen { display:none; width:100%; height:100%; padding:8px 20px; overflow:hidden; flex-direction:column; }
.tv-screen.active { display:flex; }

/* STATUS BAR */
.tv-status { font-size:11px; color:var(--text3); letter-spacing:2px; text-align:right; margin-bottom:8px; flex-shrink:0; }
.tv-status.offline { color:var(--bordeaux2); }

/* ═══ SEATING SCREEN ═══ */
#tv-seating { padding:16px 24px; }
.tv-tables-grid { display:grid; gap:16px; height:100%; align-items:start; }
.tv-table-col { background:var(--dark2); border:1px solid var(--gold3); border-radius:10px; overflow:hidden; }
.tv-table-col.final { border-color:var(--gold); }
.tv-table-header { background:var(--dark3); padding:14px 20px; text-align:center; border-bottom:1px solid rgba(201,169,110,0.2); }
.tv-table-name { font-family:'Cormorant Garamond',serif; font-size:clamp(22px,3vw,36px); color:var(--gold2); font-weight:700; letter-spacing:3px; }
.tv-table-count { font-size:11px; color:var(--text3); margin-top:3px; letter-spacing:1px; }
.tv-seat-row { display:flex; align-items:center; gap:12px; padding:clamp(6px,1.2vh,12px) 16px; border-bottom:1px solid rgba(201,169,110,0.07); }
.tv-seat-row:last-child { border-bottom:none; }
.tv-seat-row.empty { opacity:0.25; }
.tv-seat-num { font-family:'Cormorant Garamond',serif; font-size:clamp(20px,2.5vw,32px); color:var(--gold); font-weight:700; min-width:36px; text-align:center; }
.tv-seat-name { font-size:clamp(16px,2vw,26px); color:var(--text); font-weight:600; flex:1; }
.tv-seat-rank { font-size:clamp(11px,1.2vw,16px); color:var(--text3); }

/* FINAL TABLE COMPACT — all 10 on screen */
.tv-final-table-wrap { display:flex; flex-direction:column; height:calc(100vh - 64px); padding:10px 28px 10px; }
.tv-final-table-header { text-align:center; flex-shrink:0; margin-bottom:8px; }
.tv-final-table-title { font-family:'Cormorant Garamond',serif; font-size:clamp(32px,5vw,60px); color:var(--gold); font-weight:700; letter-spacing:6px; line-height:1; }
.tv-final-table-sub { font-size:clamp(11px,1.2vw,15px); color:var(--text3); letter-spacing:2px; margin-top:4px; }
.tv-final-rows { flex:1; display:flex; flex-direction:column; background:var(--dark2); border:1px solid var(--gold); border-radius:10px; overflow:hidden; }
.tv-final-row { display:flex; align-items:center; gap:16px; flex:1; padding:0 20px; border-bottom:1px solid rgba(201,169,110,0.08); }
.tv-final-row:last-child { border-bottom:none; }
.tv-final-row.empty-row { opacity:0.2; }
.tv-final-num { font-family:'Cormorant Garamond',serif; font-size:clamp(22px,3vw,40px); color:var(--gold); font-weight:700; min-width:44px; text-align:center; }
.tv-final-name { font-size:clamp(20px,2.8vw,42px); color:var(--text); font-weight:600; flex:1; letter-spacing:1px; }
.tv-final-rank { font-size:clamp(13px,1.5vw,20px); color:var(--text3); }
.tv-rebalance { background:var(--bordeaux); border-radius:8px; padding:14px 20px; margin-bottom:14px; text-align:center; flex-shrink:0; }
.tv-rebalance-title { font-size:clamp(14px,1.8vw,22px); color:var(--gold2); letter-spacing:4px; margin-bottom:10px; }
.tv-rebalance-row { font-size:clamp(14px,1.8vw,22px); color:var(--beige); padding:6px 0; }
.tv-final-banner { text-align:center; padding:16px 0 20px; flex-shrink:0; }
.tv-final-text { font-family:'Cormorant Garamond',serif; font-size:clamp(40px,6vw,80px); color:var(--gold); font-weight:700; letter-spacing:6px; }

/* ═══ TOURNAMENT SCREEN ═══ */
#tv-tournament { justify-content:center; align-items:center; text-align:center; }
.tv-phase-label { font-size:clamp(12px,1.5vw,18px); color:var(--gold3); letter-spacing:6px; margin-bottom:16px; }
.tv-level-label { font-family:'Cormorant Garamond',serif; font-size:clamp(28px,4vw,52px); color:var(--text2); letter-spacing:6px; margin-bottom:12px; }
.tv-blinds-big { font-family:'Cormorant Garamond',serif; font-size:clamp(60px,10vw,140px); color:var(--gold); font-weight:700; line-height:1; letter-spacing:4px; }
.tv-ante-label { font-size:clamp(16px,2vw,28px); color:var(--text2); letter-spacing:4px; margin-top:10px; }
.tv-timer-big { font-family:'Cormorant Garamond',serif; font-size:clamp(80px,18vw,200px); color:var(--beige); font-weight:700; line-height:0.9; margin:20px 0; }
.tv-timer-big.warn { color:#F5C842; }
.tv-timer-big.crit { color:#E05555; }
.tv-paused-label { font-size:clamp(14px,1.8vw,22px); color:var(--bordeaux2); letter-spacing:6px; margin-top:-10px; margin-bottom:10px; }
.tv-next-label { font-size:clamp(13px,1.6vw,20px); color:var(--text3); letter-spacing:3px; }
.tv-next-label strong { color:var(--text2); }
.tv-updated { font-size:clamp(10px,1.2vw,14px); color:var(--text3); letter-spacing:2px; opacity:0.5; margin-top:12px; }
/* Break: bordeaux, no glow */
.tv-break-title { font-family:'Cormorant Garamond',serif; font-size:clamp(50px,8vw,110px); color:var(--bordeaux2); font-weight:700; letter-spacing:6px; }
/* Permanent final screen: calm gold, no pulse — cinematic already fired */
.tv-final-title { font-family:'Cormorant Garamond',serif; font-size:clamp(36px,5vw,72px); color:var(--gold); font-weight:700; letter-spacing:6px; opacity:0.9; }

/* ═══ RATING SCREEN ═══ */
#tv-rating { padding:16px 24px; }
.tv-rating-title { font-family:'Cormorant Garamond',serif; font-size:clamp(24px,3vw,40px); color:var(--gold); letter-spacing:4px; font-weight:700; text-align:center; margin-bottom:16px; flex-shrink:0; }
.tv-rating-table { width:100%; border-collapse:collapse; }
.tv-rating-table th { background:var(--dark3); color:var(--gold3); font-size:clamp(9px,1vw,13px); letter-spacing:2px; padding:10px 14px; border-bottom:1px solid var(--gold3); }
.tv-rating-table td { padding:clamp(8px,1.2vh,14px) 14px; font-size:clamp(14px,1.8vw,24px); border-bottom:1px solid rgba(201,169,110,0.08); }
.tv-rating-table .place-1 td { background:rgba(201,169,110,0.12); }
.tv-rating-table .place-2 td { background:rgba(180,180,190,0.06); }
.tv-rating-table .place-3 td { background:rgba(107,31,42,0.1); }
.tv-rank-num { font-size:clamp(12px,1.5vw,20px); color:var(--text3); }
.tv-player-name { font-weight:600; color:var(--text); }
.tv-player-pts { font-family:'Cormorant Garamond',serif; font-size:clamp(18px,2.5vw,36px); font-weight:700; color:var(--gold); text-align:right; }
</style>
</head>
<body>

<div class="tv-header">
  <div class="tv-logo">ОБЩЕСТВО</div>
  <div class="tv-tabs">
    <button class="tv-tab active" onclick="showTV('seating',this)">РАССАДКА</button>
    <button class="tv-tab" onclick="showTV('tournament',this)">ТУРНИР</button>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
    <div class="tv-clock" id="tv-clock">00:00</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="tv-status" style="font-size:10px;color:var(--text3);letter-spacing:1px;">● ПОДКЛЮЧЕНИЕ...</div>
      <button onclick="toggleLiteMode()" id="lite-btn" style="font-size:9px;color:var(--text3);background:none;border:1px solid rgba(160,120,64,0.3);border-radius:3px;padding:2px 8px;cursor:pointer;font-family:'Montserrat',sans-serif;letter-spacing:1px;">LITE</button>
    </div>
  </div>
</div>

<div class="tv-main">
  <!-- SEATING -->
  <div class="tv-screen active" id="tv-seating">
    <div id="tv-seating-content" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div style="text-align:center;padding:60px;color:var(--text3);font-size:20px;letter-spacing:3px;">РАССАДКА ЕЩЁ НЕ ГОТОВА</div>
    </div>
  </div>

  <!-- TOURNAMENT -->
  <div class="tv-screen" id="tv-tournament">
    <div id="tv-tour-content" style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
      <div style="color:var(--text3);font-size:20px;letter-spacing:3px;">ЗАГРУЗКА...</div>
    </div>
  </div>

</div>

<script>
// ── CONFIG (assembled at runtime) ──
var GS_URL=(function(){var a=[104,116,116,112,115,58,47,47,115,99,114,105,112,116,46,103,111,111,103,108,101,46,99,111,109,47,109,97,99,114,111,115,47,115,47,65,75,102,121,99,98,122,113,50,68,75,72,98,80,51,85,56,76,101,98,97,112,105,109,51,115,88,90,71,65,110,97,99,85,50,87,67,80,100,89,110,88,103,108,82,90,53,111,110,84,68,120,49,55,50,111,100,69,86,55,98,72,55,104,86,105,119,107,52,70,87,82,118,119,47,101,120,101,99];return a.map(function(c){return String.fromCharCode(c)}).join('');})();
var GS_TOKEN=(function(){var a=[111,98,115,104,101,115,116,118,111,95,115,101,99,114,101,116,95,50,48,50,54];return a.map(function(c){return String.fromCharCode(c)}).join('');})();
var MONTHS=['ЯНВАРЬ','ФЕВРАЛЬ','МАРТ','АПРЕЛЬ','МАЙ','ИЮНЬ','ИЮЛЬ','АВГУСТ','СЕНТЯБРЬ','ОКТЯБРЬ','НОЯБРЬ','ДЕКАБРЬ'];
var MONTHS_SHORT=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
var MAX_NICK=12;

var db=null;
var now=new Date();
var curMonth=now.getMonth();
var curYear=now.getFullYear();
var timerInterval=null;
var refreshInterval=null;
var tvLastPhase=-1;

// ── UTILS ──
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function nick(s){if(!s)return'';s=String(s);return s.length>MAX_NICK?s.slice(0,MAX_NICK)+'…':s;}
function pad2(n){return String(n).padStart(2,'0');}
function fmtTime(sec){sec=Math.max(0,Math.ceil(sec||0));return pad2(Math.floor(sec/60))+':'+pad2(sec%60);}
function fmtChips(n){return String(n).replace(/\B(?=(\d{3})+(?!\d))/g,' ');}
function gmk(m,y){return y+'-'+pad2(m+1);}

// ── LITE MODE ──
var liteMode = false;
function toggleLiteMode() {
  liteMode = !liteMode;
  document.body.classList.toggle('lite', liteMode);
  var btn = document.getElementById('lite-btn');
  if(btn) btn.classList.toggle('active', liteMode);
  try { localStorage.setItem('tv_lite', liteMode?'1':'0'); } catch(e){}
}
// Restore saved preference
(function(){
  try {
    if(localStorage.getItem('tv_lite')==='1'){
      liteMode=true;
      document.body.classList.add('lite');
      var b=document.getElementById('lite-btn');
      if(b) b.classList.add('active');
    }
  } catch(e){}
})();

// ── AUTO-LITE: FPS detector (runs for 10s after load) ──
// If median frame time > 40ms (~<25fps) → auto-enable lite mode
(function(){
  if(liteMode) return; // already in lite, skip
  var samples=[], last=null, rafId=null;
  var SAMPLE_WINDOW=10000, THRESHOLD_MS=40, MIN_SAMPLES=20;

  var sample=function(ts){
    if(last!==null) samples.push(ts-last);
    last=ts;
    if(Date.now()-startTime < SAMPLE_WINDOW){
      rafId=requestAnimationFrame(sample);
    } else {
      // Done — compute median
      if(samples.length < MIN_SAMPLES) return;
      var sorted=samples.slice().sort(function(a,b){return a-b;});
      var median=sorted[Math.floor(sorted.length/2)];
      if(median > THRESHOLD_MS && !liteMode){
        toggleLiteMode();
        var btn=document.getElementById('lite-btn');
        if(btn) btn.title='LITE включён автоматически (низкий FPS)';
        console.log('[TV] Auto-LITE: median frame '+median.toFixed(1)+'ms, enabling lite mode');
      }
    }
  };
  var startTime=Date.now();
  rafId=requestAnimationFrame(sample);
})();

// ── CLOCK ──
function updateClock(){
  var d=new Date();
  var msk=new Date(d.toLocaleString('en-US',{timeZone:'Europe/Moscow'}));
  document.getElementById('tv-clock').textContent=pad2(msk.getHours())+':'+pad2(msk.getMinutes());
}
setInterval(updateClock,1000);
updateClock();

// ── LOAD ──

function setStatus(state){
  var el=document.getElementById('tv-status');
  if(!el)return;
  if(state==='ok'){el.textContent='● ОНЛАЙН';el.style.color='#5BAD6F';}
  else{el.textContent='● НЕТ СВЯЗИ';el.style.color='#C0404A';}
}

// ── TABS ──
var currentTV='seating';
function showTV(name,btn){
  currentTV=name;
  document.querySelectorAll('.tv-screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.tv-tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('tv-'+name).classList.add('active');
  btn.classList.add('active');
  // Немедленно обновить данные при переключении вкладки
  if(!syncing){
    loadData(function(){ render(); });
  } else {
    render();
  }
}

// ── RATING CALC ──
function getMonthRating(){
  if(!db||!db.results)return[];
  var key=gmk(curMonth,curYear);
  var map={};
  db.results.forEach(function(r){
    if(r.monthKey!==key)return;
    if(!map[r.player])map[r.player]={points:0,games:0};
    map[r.player].points+=r.points;
    map[r.player].games+=1;
  });
  return Object.entries(map).sort(function(a,b){return b[1].points-a[1].points;});
}

// ── RENDER SEATING ──
// Seat angle: clockwise from 12 oclock, 0-indexed (0=top)
function seatAngle(seatIdx){
  return (seatIdx / 10) * 2 * Math.PI - Math.PI/2;
}

function renderSeating(){
  var cont=document.getElementById('tv-seating-content');
  if(!db||!db.seating||!db.seating.tables||!db.seating.tables.length){
    cont.innerHTML='<div style="text-align:center;padding:80px 0;color:var(--text3);font-size:clamp(16px,2vw,28px);letter-spacing:4px;">РАССАДКА ЕЩЁ НЕ ГОТОВА</div>';
    return;
  }
  var rating=getMonthRating();
  var rm={};rating.forEach(function(r,i){rm[r[0]]=i+1;});
  var tables=db.seating.tables;
  var isFinal=db.seating.status==='final';

  // ── FINAL TABLE ──
  if(isFinal){
    var allPlayers=tables[0]?tables[0].players:[];
    var rows='';
    for(var si=0;si<10;si++){
      var p=allPlayers[si];
      if(p){
        var rank=rm[p];
        rows+='<div class="tv-final-row"><span class="tv-final-num">'+(si+1)+'</span><span class="tv-final-name">'+esc(nick(p))+'</span><span class="tv-final-rank">'+(rank?'#'+rank:'')+'</span></div>';
      }
    }
    cont.innerHTML='<div class="tv-final-table-wrap"><div class="tv-final-table-header"><div class="tv-final-table-title">🏆 ФИНАЛЬНЫЙ СТОЛ</div><div class="tv-final-table-sub">СИЛЬНЕЙШИЕ · ПОСЛЕДНИЙ ШАНС</div></div><div class="tv-final-rows">'+rows+'</div></div>';
    return;
  }

  // ── REBALANCE BANNER ──
  var banner='';
  if(db.seating.status==='rebalancing'&&db.seating.rebalanceInfo){
    var movers=db.seating.rebalanceInfo.movers;
    banner='<div class="tv-rebalance" style="flex-shrink:0;"><div class="tv-rebalance-title">⚠️ ПЕРЕСАДКА</div>';
    movers.forEach(function(m){
      banner+='<div class="tv-rebalance-row"><strong>'+esc(m.name)+'</strong> → <strong>'+esc(m.to)+'</strong></div>';
    });
    banner+='</div>';
  }


  // ── POKER TABLE OVAL LAYOUT ──
  // Real poker table: ~2.5:1 ratio, much wider than tall
  var svgW = tc===1 ? 960 : 860;
  var svgH = tc===1 ? 420 : 400;
  var cx = svgW/2, cy = svgH/2;
  var rx = svgW * 0.44;  // very wide
  var ry = svgH * 0.30;  // very flat

  var html = banner + '<div style="display:flex;gap:clamp(4px,1vw,16px);height:100%;align-items:center;justify-content:center;padding:2px 4px;">';

  tables.forEach(function(table, ti){
    var players = table.players;
    var n = players.filter(Boolean).length;
    var tid = 'T' + ti;

    var svg = '<svg viewBox="0 0 '+svgW+' '+svgH+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;overflow:visible;">';

    svg += '<defs>';
    // Deep green felt with rich centre glow
    svg += '<radialGradient id="felt'+tid+'" cx="50%" cy="38%" r="62%">'
         + '<stop offset="0%"   stop-color="#1d6a3f"/>'
         + '<stop offset="45%"  stop-color="#15502f"/>'
         + '<stop offset="100%" stop-color="#0d3820"/>'
         + '</radialGradient>';
    // Vignette shadow at felt edges
    svg += '<radialGradient id="fvig'+tid+'" cx="50%" cy="50%" r="50%">'
         + '<stop offset="55%"  stop-color="rgba(0,0,0,0)"/>'
         + '<stop offset="82%"  stop-color="rgba(0,0,0,0.25)"/>'
         + '<stop offset="100%" stop-color="rgba(0,0,0,0.52)"/>'
         + '</radialGradient>';
    // Light source highlight upper-left
    svg += '<radialGradient id="fhi'+tid+'" cx="34%" cy="28%" r="42%">'
         + '<stop offset="0%"   stop-color="rgba(255,255,255,0.08)"/>'
         + '<stop offset="100%" stop-color="rgba(255,255,255,0)"/>'
         + '</radialGradient>';
    // Rail: gold bevel
    svg += '<linearGradient id="rail'+tid+'" x1="0%" y1="0%" x2="0%" y2="100%">'
         + '<stop offset="0%"   stop-color="#e8c460"/>'
         + '<stop offset="18%"  stop-color="#a07818"/>'
         + '<stop offset="62%"  stop-color="#6a4c08"/>'
         + '<stop offset="90%"  stop-color="#8a6210"/>'
         + '<stop offset="100%" stop-color="#c49028"/>'
         + '</linearGradient>';
    // Table drop shadow
    svg += '<filter id="tsh'+tid+'" x="-20%" y="-25%" width="140%" height="160%">'
         + '<feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="rgba(0,0,0,0.82)"/>'
         + '</filter>';
    // Name glow
    svg += '<filter id="ng'+tid+'" x="-35%" y="-90%" width="170%" height="280%">'
         + '<feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>'
         + '<feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>'
         + '</filter>';
    svg += '</defs>';

    // TABLE LAYERS
    svg += '<ellipse cx="'+cx+'" cy="'+(cy+16)+'" rx="'+(rx+28)+'" ry="'+(ry+22)+'" fill="rgba(0,0,0,0.5)" filter="url(#tsh'+tid+')"/>';
    svg += '<ellipse cx="'+cx+'" cy="'+(cy-2)+'" rx="'+(rx+25)+'" ry="'+(ry+22)+'" fill="#e8c460"/>';
    svg += '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+(rx+22)+'" ry="'+(ry+20)+'" fill="url(#rail'+tid+')"/>';
    svg += '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+(rx+10)+'" ry="'+(ry+9)+'" fill="#18100200"/>';
    svg += '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="url(#felt'+tid+')"/>';
    svg += '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="url(#fvig'+tid+')"/>';
    svg += '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="url(#fhi'+tid+')"/>';
    svg += '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+(rx*0.2)+'" ry="'+(ry*0.2)+'" fill="none" stroke="rgba(201,169,110,0.07)" stroke-width="1" stroke-dasharray="3,8"/>';

    svg += '<text x="'+cx+'" y="'+(cy-7)+'" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="22" fill="rgba(201,169,110,0.3)" font-weight="700" letter-spacing="6">'+table.name.toUpperCase()+'</text>';
    svg += '<text x="'+cx+'" y="'+(cy+15)+'" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="rgba(201,169,110,0.15)" letter-spacing="3">'+n+' ИГРОКОВ</text>';

    // SEATS
    for(var si=0; si<10; si++){
      var player = players[si];
      var angle  = seatAngle(si);
      var cosA   = Math.cos(angle);
      var sinA   = Math.sin(angle);

      var px = cx + cosA * (rx + 5);
      var py = cy + sinA * (ry + 5);

      // Label further on sides, closer top/bottom
      var ld = 56 + Math.abs(cosA) * 22;
      var lx = cx + cosA * (rx + ld);
      var ly = cy + sinA * (ry + ld);

      var seatNum = si + 1;
      var anchor  = Math.abs(cosA) < 0.24 ? 'middle' : (cosA > 0 ? 'start' : 'end');

      if(!player){
        svg += '<circle cx="'+px+'" cy="'+py+'" r="10" fill="rgba(0,0,0,0.15)" stroke="rgba(201,169,110,0.08)" stroke-width="1"/>';
        svg += '<text x="'+px+'" y="'+(py+3.5)+'" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="8" fill="rgba(201,169,110,0.12)" font-weight="600">'+seatNum+'</text>';
      } else {
        svg += '<circle cx="'+px+'" cy="'+(py+3)+'" r="23" fill="rgba(0,0,0,0.55)"/>';
        svg += '<circle cx="'+px+'" cy="'+py+'" r="23" fill="#7a5610" stroke="#DDB84A" stroke-width="3.5"/>';
        svg += '<circle cx="'+(px-7)+'" cy="'+(py-7)+'" r="9" fill="rgba(255,220,80,0.11)"/>';
        svg += '<text x="'+px+'" y="'+(py+6)+'" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="17" fill="#F5DFA0" font-weight="900">'+seatNum+'</text>';

        // Name: 24px, white, bold — readable from across the room
        var nameY = ly + (sinA > 0.2 ? 9 : sinA < -0.2 ? -7 : 3);
        svg += '<text x="'+lx+'" y="'+nameY+'" text-anchor="'+anchor+'" font-family="Montserrat,sans-serif" font-size="24" fill="#FFFFFF" font-weight="800" filter="url(#ng'+tid+')">'+esc(nick(player))+'</text>';
        // No rank — name only
      }
    }

    svg += '</svg>';
    html += '<div style="flex:1;max-width:'+(tc===1?'99%':'49.5%')+';display:flex;align-items:center;justify-content:center;">'+svg+'</div>';
  });
  cont.innerHTML = html;
}

// ── RENDER TOURNAMENT ──
var TOURNAMENT_STRUCTURE=[
  {type:'level',level:1,sb:100,bb:100,ante:0,duration:720},
  {type:'level',level:2,sb:100,bb:200,ante:0,duration:720},
  {type:'level',level:3,sb:200,bb:300,ante:0,duration:720},
  {type:'level',level:4,sb:200,bb:400,ante:0,duration:720},
  {type:'level',level:5,sb:300,bb:600,ante:0,duration:720},
  {type:'break',title:'ПЕРЕРЫВ',duration:600},
  {type:'level',level:6,sb:400,bb:800,ante:0,duration:720},
  {type:'level',level:7,sb:500,bb:1000,ante:500,duration:720},
  {type:'level',level:8,sb:600,bb:1200,ante:600,duration:720},
  {type:'level',level:9,sb:800,bb:1600,ante:800,duration:720},
  {type:'level',level:10,sb:1000,bb:2000,ante:1000,duration:720},
  {type:'break',title:'АДД-ОН ПЕРЕРЫВ',duration:600,addon:true},
  {type:'level',level:11,sb:1500,bb:3000,ante:1500,duration:600},
  {type:'level',level:12,sb:2000,bb:4000,ante:2000,duration:600},
  {type:'level',level:13,sb:2500,bb:5000,ante:2500,duration:600},
  {type:'level',level:14,sb:3000,bb:6000,ante:3000,duration:600},
  {type:'level',level:15,sb:4000,bb:8000,ante:4000,duration:600},
  {type:'break',title:'ПЕРЕРЫВ',duration:600},
  {type:'level',level:16,sb:5000,bb:10000,ante:5000,duration:600},
  {type:'level',level:17,sb:6000,bb:12000,ante:6000,duration:600},
  {type:'level',level:18,sb:8000,bb:16000,ante:8000,duration:600},
  {type:'level',level:19,sb:10000,bb:20000,ante:10000,duration:600},
  {type:'level',level:20,sb:15000,bb:30000,ante:15000,duration:600},
  {type:'level',level:21,sb:20000,bb:40000,ante:20000,duration:600},
  {type:'level',level:22,sb:30000,bb:60000,ante:30000,duration:600},
  {type:'level',level:23,sb:40000,bb:80000,ante:40000,duration:600},
  {type:'level',level:24,sb:50000,bb:100000,ante:50000,duration:600},
  {type:'level',level:25,sb:75000,bb:150000,ante:75000,duration:600},
];

function getRem(){
  if(!db||!db.tournament)return 0;
  var t=db.tournament;
  var idx=Math.max(0,Math.min(t.phaseIndex||0,TOURNAMENT_STRUCTURE.length-1));
  var phase=TOURNAMENT_STRUCTURE[idx];
  var dur=phase.duration;
  var base=t.remainingSec!==undefined?t.remainingSec:dur;
  if(t.running&&t.startedAt){
    var elapsed=Math.floor((Date.now()-new Date(t.startedAt).getTime())/1000);
    return Math.max(0,base-elapsed);
  }
  return Math.max(0,base);
}

function getNextLevel(idx){
  for(var i=idx+1;i<TOURNAMENT_STRUCTURE.length;i++){
    if(TOURNAMENT_STRUCTURE[i].type==='level')return TOURNAMENT_STRUCTURE[i];
  }
  return null;
}

function renderTournament(){
  var cont=document.getElementById('tv-tour-content');
  if(!db||!db.tournament){
    cont.innerHTML='<div style="color:var(--text3);font-size:20px;letter-spacing:3px;">ТУРНИР НЕ ЗАПУЩЕН</div>';
    return;
  }
  var t=db.tournament;
  var idx=Math.max(0,Math.min(t.phaseIndex||0,TOURNAMENT_STRUCTURE.length-1));
  var phase=TOURNAMENT_STRUCTURE[idx];
  var rem=getRem();
  var next=getNextLevel(idx);
  var nextText=next?fmtChips(next.sb)+' / '+fmtChips(next.bb)+(next.ante?' · АНТЕ '+fmtChips(next.ante):''):'ФИНАЛ';
  var timerClass=rem<=60?'crit':rem<=180?'warn':'';
  var pauseHtml=t.running?'':'<div class="tv-paused-label">ПАУЗА</div>';
  var updStr='';
  if(t.updatedAt){
    var d=new Date(t.updatedAt);
    var msk=new Date(d.toLocaleString('en-US',{timeZone:'Europe/Moscow'}));
    updStr='<div class="tv-updated">обновлено в '+pad2(msk.getHours())+':'+pad2(msk.getMinutes())+'</div>';
  }

  if(t.finalMode&&phase.type==='level'){
    // Permanent screen: calm, informative. Cinematic already fired the wow moment.
    cont.innerHTML=
      '<div class="tv-final-title">ФИНАЛ</div>'+
      '<div class="tv-level-label" style="margin-top:8px;">УР. '+phase.level+' · '+fmtChips(phase.sb)+' / '+fmtChips(phase.bb)+'</div>'+
      (phase.ante?'<div class="tv-ante-label">АНТЕ '+fmtChips(phase.ante)+'</div>':'')+
      '<div class="tv-timer-big '+timerClass+'">'+fmtTime(rem)+'</div>'+
      pauseHtml+updStr;
    return;
  }
  if(phase.type==='break'){
    cont.innerHTML='<div class="tv-break-title">'+esc(phase.title||'ПЕРЕРЫВ')+'</div><div class="tv-timer-big">'+fmtTime(rem)+'</div><div class="tv-next-label">следующий: <strong>'+nextText+'</strong></div>'+pauseHtml+updStr;
    return;
  }
  var label=phase.level<=10?'РЕГИСТРАЦИЯ ОТКРЫТА':'РЕГИСТРАЦИЯ ЗАКРЫТА';
  cont.innerHTML='<div class="tv-phase-label">'+label+'</div><div class="tv-level-label">УРОВЕНЬ '+phase.level+'</div><div class="tv-blinds-big">'+fmtChips(phase.sb)+' / '+fmtChips(phase.bb)+'</div>'+(phase.ante?'<div class="tv-ante-label">АНТЕ '+fmtChips(phase.ante)+'</div>':'')+'<div class="tv-timer-big '+timerClass+'">'+fmtTime(rem)+'</div>'+pauseHtml+'<div class="tv-next-label">следующий: <strong>'+nextText+'</strong></div>'+updStr;
}

// ── SINGLE MASTER LOOP ──
var lastDbHash = '';
var lastPhaseIndex = -1;
var lastFinalMode = false;
var tickCount = 0;
var syncing = false; // prevent parallel fetches

function dbHash(){
  if(!db) return '';
  var t=db.tournament;
  var tHash=t ? t.phaseIndex+'|'+t.running+'|'+t.finalMode+'|'+(t.updatedAt||'') : 'notour';
  // Include player data in hash so TV re-renders when seating changes
  var sHash='noseat';
  if(db.seating){
    var playerSig=db.seating.tables
      ? db.seating.tables.map(function(t){return t.players.filter(Boolean).join(',');}).join('|')
      : '';
    sHash=(db.seating.generatedAt||'')+'|'+(db.seating.status||'')+'|'+playerSig;
  }
  return tHash+'||'+sHash;
}

var advanceLock = false;
var lastAdvanceIndex = -1;
var tvSyncJitter = Math.floor(Math.random() * 10); // случайный сдвиг 0-9 для каждого TV // track which phase we already advanced from

function autoAdvanceIfNeeded(){
  if(!db||!db.tournament||!db.tournament.running) return;
  if(advanceLock) return;

  var rem=getRem();
  if(rem>0) return; // only advance when timer actually hits 0

  var t=db.tournament;
  var currentIdx=t.phaseIndex||0;

  // Do not advance same phase twice
  if(currentIdx===lastAdvanceIndex) return;

  // Last phase — stop
  if(currentIdx>=TOURNAMENT_STRUCTURE.length-1){
    t.running=false; t.startedAt=null; t.remainingSec=0;
    lastAdvanceIndex=currentIdx;
    lastPhaseIndex=-1; lastDbHash='';
    renderTournament();
    return;
  }

  // ── STEP 1: локально мгновенно ──
  advanceLock=true;
  lastAdvanceIndex=currentIdx;
  var nextIdx=currentIdx+1;
  var nextPhase=TOURNAMENT_STRUCTURE[nextIdx];

  t.phaseIndex=nextIdx;
  t.remainingSec=nextPhase.duration;
  t.startedAt=new Date().toISOString();
  t.updatedAt=new Date().toISOString();

  lastPhaseIndex=-1;
  lastDbHash='';
  renderTournament(); // мгновенный рендер без ожидания

  // ── STEP 2: облако фоном ──
  fetch(GS_URL+'?token='+GS_TOKEN,{
    method:'POST',
    body:JSON.stringify(Object.assign({},db,{_token:GS_TOKEN}))
  })
    .then(function(r){if(!r.ok)throw new Error(r.status);})
    .catch(function(){}) // ошибка не критична — локально уже переключились
    .finally(function(){
      // Держим advanceLock ещё 12с после записи в облако —
      // чтобы следующий cloud-sync не откатил наш локальный переход
      setTimeout(function(){ advanceLock=false; }, 12000);
    });
}
function masterTick(){
  tickCount++;

  // Every ~10 ticks but with random jitter so multiple TVs don't hit cloud at same time
  // Each TV gets a different offset: jitter spreads 3 TVs across 10s window
  if(tickCount % 10 === tvSyncJitter && !syncing){
    syncing=true;
    fetch(GS_URL+'?token='+GS_TOKEN,{method:'GET'})
      .then(function(r){
        if(!r.ok) throw new Error(r.status);
        return r.text();
      })
      .then(function(txt){
        var data=JSON.parse(txt.replace(/^\uFEFF/,'').trim());
        if(!data||typeof data!=='object') throw new Error('bad');
        var oldHash=dbHash();

        // ── ЗАЩИТА: не откатывать локальное переключение уровня ──
        // Если мы только что переключили уровень локально (advanceLock или
        // lastAdvanceIndex совпадает с текущим phaseIndex), не доверяем облаку
        // пока оно не догонит нас.
        if(data.tournament && db && db.tournament){
          var cloudIdx = data.tournament.phaseIndex || 0;
          var localIdx = db.tournament.phaseIndex || 0;
          if(localIdx > cloudIdx){
            // Облако ещё не получило наше переключение — берём только не-турнирные данные
            data.tournament = db.tournament; // держим локальный турнир
          }
        }

        db=data;
        if(!db.players)db.players=[];
        if(!db.results)db.results=[];
        if(!db.seating)db.seating=null;
        if(!db.tournament)db.tournament=null;
        setStatus('ok');
        var newHash=dbHash();
        // Always re-render seating on sync (player positions may have changed)
        if(currentTV==='seating'){
          renderSeating();
        }
        if(currentTV==='tournament' && newHash!==oldHash){
          // tournament handled by render loop
        }
        lastDbHash=newHash;
      })
      .catch(function(){ setStatus('err'); })
      .finally(function(){ syncing=false; });
  }

  // Auto-advance phase on every tick regardless of current tab
  autoAdvanceIfNeeded();

  // Every tick — update timer only
  if(currentTV==='tournament'){
    var h=dbHash();
    var phaseChanged=(db&&db.tournament&&db.tournament.phaseIndex!==lastPhaseIndex);
    var finalChanged=(db&&db.tournament&&db.tournament.finalMode!==lastFinalMode);

    if(phaseChanged||finalChanged||h!==lastDbHash){
      renderTournament();
      if(db&&db.tournament){
        lastPhaseIndex=db.tournament.phaseIndex;
        lastFinalMode=db.tournament.finalMode;
      }
      lastDbHash=h;
    } else {
      // Only update timer element — no DOM rebuild
      var timerEl=document.querySelector('.tv-timer-big');
      if(timerEl&&db&&db.tournament){
        var rem=getRem();
        timerEl.textContent=fmtTime(rem);
        timerEl.className='tv-timer-big'+(rem<=60?' crit':rem<=180?' warn':'');
      }
    }
  }

  // Schedule next tick with drift correction
  var drift=Date.now()%1000;
  setTimeout(masterTick, Math.max(50, 1000-drift));
}

function render(){
  if(currentTV==='seating') renderSeating();
  if(currentTV==='tournament') renderTournament();
}

function loadData(cb){
  fetch(GS_URL+'?token='+GS_TOKEN,{method:'GET'})
    .then(function(r){
      if(!r.ok) throw new Error(r.status);
      return r.text();
    })
    .then(function(txt){
      var data=JSON.parse(txt.replace(/^\uFEFF/,'').trim());
      if(!data||typeof data!=='object') throw new Error('bad data');
      db=data;
      if(!db.players)db.players=[];
      if(!db.results)db.results=[];
      if(!db.seating)db.seating=null;
      if(!db.tournament)db.tournament=null;
      setStatus('ok');
      if(cb)cb();
    })
    .catch(function(){
      setStatus('err');
      // Still call cb so the app starts, render() handles db=null gracefully
      if(cb)cb();
    });
}

// Initial load then start loop
loadData(function(){
  render();
  lastDbHash=dbHash();
  if(db&&db.tournament){
    lastPhaseIndex=db.tournament.phaseIndex||0;
    lastFinalMode=db.tournament.finalMode||false;
  }
  // Start with drift correction
  var drift=Date.now()%1000;
  setTimeout(masterTick, Math.max(50, 1000-drift));
});
</script>
