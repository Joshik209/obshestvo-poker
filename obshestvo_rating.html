<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Общество — Рейтинг клуба</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a0f05; font-family: Georgia, serif; min-height: 100vh; color: #2C1A0E; }

  .header { background: #2C1A0E; padding: 20px 16px 0; text-align: center; }
  .header-club { font-size: 11px; color: #A0722A; letter-spacing: 4px; margin-bottom: 4px; }
  .header-title { font-size: 32px; color: #FDF6EC; font-weight: 700; letter-spacing: 2px; }
  .header-sub { font-size: 11px; color: #A0722A; letter-spacing: 2px; margin-top: 2px; padding-bottom: 16px; }
  .header-tagline { background: #A0722A; padding: 8px; font-size: 11px; color: #FDF6EC; letter-spacing: 1px; text-align: center; }

  .tabs { display: flex; background: #2C1A0E; border-bottom: 1px solid #A0722A; }
  .tab { flex: 1; padding: 12px; text-align: center; font-size: 12px; letter-spacing: 1px; color: #7A5C3A; cursor: pointer; border: none; background: none; font-family: Georgia, serif; }
  .tab.active { color: #A0722A; border-bottom: 2px solid #A0722A; }

  .page { display: none; padding: 16px; background: #FDF6EC; min-height: calc(100vh - 140px); }
  .page.active { display: block; }

  /* RATING PAGE */
  .month-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .month-label { font-size: 13px; color: #A0722A; letter-spacing: 2px; }
  .month-nav { background: #2C1A0E; color: #A0722A; border: none; padding: 6px 14px; font-family: Georgia, serif; font-size: 12px; cursor: pointer; border-radius: 3px; }

  .rating-table { width: 100%; border-collapse: collapse; }
  .rating-table th { background: #2C1A0E; color: #A0722A; font-size: 10px; letter-spacing: 1px; padding: 8px 6px; text-align: center; font-weight: 400; }
  .rating-table th:first-child { text-align: left; padding-left: 12px; }
  .rating-table td { padding: 10px 6px; text-align: center; font-size: 14px; border-bottom: 0.5px solid #E8D8B8; }
  .rating-table td:first-child { text-align: left; padding-left: 12px; }
  .rating-table tr:nth-child(even) td { background: #FAF3E8; }

  .place-1 { background: #FDF0D0 !important; }
  .place-2 { background: #F5F5F0 !important; }
  .place-3 { background: #FAECE7 !important; }

  .medal { font-size: 16px; }
  .player-name { font-weight: 700; font-size: 14px; color: #2C1A0E; }
  .player-games { font-size: 11px; color: #7A5C3A; }
  .points-big { font-size: 18px; font-weight: 700; color: #A0722A; }

  .top10-badge { background: #A0722A; color: #FDF6EC; font-size: 9px; padding: 2px 6px; border-radius: 10px; letter-spacing: 1px; margin-left: 6px; vertical-align: middle; }

  .empty-state { text-align: center; padding: 60px 20px; color: #7A5C3A; }
  .empty-state .big { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ADMIN PAGE */
  .admin-section { background: white; border: 0.5px solid #D4B483; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .admin-section h3 { font-size: 11px; color: #A0722A; letter-spacing: 2px; margin-bottom: 14px; border-bottom: 0.5px solid #E8D8B8; padding-bottom: 8px; }

  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-size: 11px; color: #7A5C3A; letter-spacing: 1px; margin-bottom: 4px; }
  .form-row select, .form-row input { width: 100%; padding: 10px 12px; border: 0.5px solid #D4B483; border-radius: 4px; font-family: Georgia, serif; font-size: 14px; color: #2C1A0E; background: #FFFAF3; appearance: none; }

  .btn-gold { width: 100%; padding: 14px; background: #A0722A; color: #FDF6EC; border: none; font-family: Georgia, serif; font-size: 14px; letter-spacing: 2px; cursor: pointer; border-radius: 4px; margin-top: 4px; }
  .btn-gold:active { background: #7A5520; }

  .btn-dark { width: 100%; padding: 12px; background: #2C1A0E; color: #A0722A; border: none; font-family: Georgia, serif; font-size: 12px; letter-spacing: 1px; cursor: pointer; border-radius: 4px; margin-top: 8px; }

  .points-preview { background: #F5EDD8; border-radius: 4px; padding: 12px; text-align: center; margin-top: 12px; display: none; }
  .points-preview .pts { font-size: 28px; font-weight: 700; color: #A0722A; }
  .points-preview .pts-label { font-size: 11px; color: #7A5C3A; letter-spacing: 1px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #2C1A0E; color: #FDF6EC; padding: 12px 24px; border-radius: 6px; font-size: 13px; border: 1px solid #A0722A; display: none; z-index: 100; text-align: center; }

  .players-list { display: flex; flex-direction: column; gap: 8px; }
  .player-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #FFFAF3; border: 0.5px solid #D4B483; border-radius: 4px; }
  .player-item-name { font-size: 14px; color: #2C1A0E; font-weight: 700; }
  .btn-remove { background: none; border: 0.5px solid #D85A30; color: #D85A30; padding: 4px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; font-family: Georgia, serif; }

  .history-list { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
  .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #FFFAF3; border: 0.5px solid #E8D8B8; border-radius: 4px; font-size: 12px; }
  .history-item .hi-name { font-weight: 700; color: #2C1A0E; }
  .history-item .hi-detail { color: #7A5C3A; font-size: 11px; }
  .history-item .hi-pts { color: #A0722A; font-weight: 700; }
  .btn-undo { background: none; border: none; color: #7A5C3A; font-size: 11px; cursor: pointer; font-family: Georgia, serif; text-decoration: underline; }

  .admin-lock { text-align: center; padding: 40px 20px; }
  .pin-input { text-align: center; letter-spacing: 8px; font-size: 24px; width: 160px; margin: 16px auto; display: block; }
  .pin-hint { font-size: 11px; color: #7A5C3A; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-club">К Л У Б</div>
  <div class="header-title">ОБЩЕСТВО</div>
  <div class="header-sub">БОЛЬШЕ ЧЕМ ИГРА</div>
</div>
<div class="header-tagline">РЕЙТИНГ КЛУБА — ИГРАЕШЬ, ЗАРАБАТЫВАЕШЬ ОЧКИ</div>

<div class="tabs">
  <button class="tab active" onclick="showPage('rating')">РЕЙТИНГ</button>
  <button class="tab" onclick="showPage('admin')">АДМИН</button>
</div>

<!-- RATING PAGE -->
<div class="page active" id="page-rating">
  <div class="month-bar">
    <button class="month-nav" onclick="changeMonth(-1)">◀</button>
    <div class="month-label" id="month-label">МАЙ 2026</div>
    <button class="month-nav" onclick="changeMonth(1)">▶</button>
  </div>

  <div id="rating-content"></div>
</div>

<!-- ADMIN PAGE -->
<div class="page" id="page-admin">
  <div id="admin-lock-screen" class="admin-section">
    <div class="admin-lock">
      <div style="font-size:13px;color:#A0722A;letter-spacing:2px;margin-bottom:12px;">КОД ДОСТУПА</div>
      <input type="password" inputmode="numeric" maxlength="4" class="pin-input" id="pin-input" placeholder="••••">
      <div class="pin-hint">PIN-код для администратора</div>
      <button class="btn-gold" style="margin-top:16px;max-width:200px;margin-left:auto;margin-right:auto;" onclick="checkPin()">ВОЙТИ</button>
      <div id="pin-error" style="color:#D85A30;font-size:12px;margin-top:8px;display:none;">Неверный код</div>
    </div>
  </div>

  <div id="admin-content" style="display:none;">

    <!-- Add result -->
    <div class="admin-section">
      <h3>ВНЕСТИ РЕЗУЛЬТАТ ТУРНИРА</h3>

      <div class="form-row">
        <label>ДЕНЬ НЕДЕЛИ</label>
        <select id="sel-day" onchange="updatePreview()">
          <option value="">— выберите день —</option>
          <option value="70">Понедельник (макс. 70 очков)</option>
          <option value="90">Вторник (макс. 90 очков)</option>
          <option value="140">Среда — Х2 (макс. 140 очков)</option>
          <option value="90">Четверг (макс. 90 очков)</option>
          <option value="110">Пятница (макс. 110 очков)</option>
          <option value="160">Суббота — главный (макс. 160 очков)</option>
          <option value="120">Воскресенье (макс. 120 очков)</option>
        </select>
      </div>

      <div class="form-row">
        <label>ИГРОК</label>
        <select id="sel-player" onchange="updatePreview()">
          <option value="">— выберите игрока —</option>
        </select>
      </div>

      <div class="form-row">
        <label>МЕСТО</label>
        <select id="sel-place" onchange="updatePreview()">
          <option value="">— выберите место —</option>
          <option value="100">1 место (100%)</option>
          <option value="80">2 место (80%)</option>
          <option value="65">3 место (65%)</option>
          <option value="50">4 место (50%)</option>
          <option value="40">5 место (40%)</option>
          <option value="30">6 место (30%)</option>
          <option value="25">7 место (25%)</option>
          <option value="20">8 место (20%)</option>
          <option value="15">9 место (15%)</option>
          <option value="participation">Участие (+15 очков)</option>
        </select>
      </div>

      <div class="points-preview" id="points-preview">
        <div class="pts" id="preview-pts">0</div>
        <div class="pts-label">ОЧКОВ БУДЕТ НАЧИСЛЕНО</div>
      </div>

      <button class="btn-gold" onclick="addResult()">НАЧИСЛИТЬ ОЧКИ</button>
    </div>

    <!-- History -->
    <div class="admin-section">
      <h3>ПОСЛЕДНИЕ ЗАПИСИ</h3>
      <div class="history-list" id="history-list">
        <div style="text-align:center;color:#7A5C3A;font-size:13px;padding:20px;">Записей пока нет</div>
      </div>
    </div>

    <!-- Players -->
    <div class="admin-section">
      <h3>СПИСОК ИГРОКОВ</h3>
      <div class="players-list" id="players-list"></div>
      <div class="form-row" style="margin-top:12px;">
        <label>ДОБАВИТЬ ИГРОКА</label>
        <input type="text" id="new-player-input" placeholder="Имя игрока" style="margin-bottom:8px;">
      </div>
      <button class="btn-dark" onclick="addPlayer()">+ ДОБАВИТЬ</button>
    </div>

    <div style="text-align:center;margin-top:8px;">
      <button class="btn-undo" onclick="logout()">Выйти из админки</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PIN = '1234';
const MONTHS = ['ЯНВАРЬ','ФЕВРАЛЬ','МАРТ','АПРЕЛЬ','МАЙ','ИЮНЬ','ИЮЛЬ','АВГУСТ','СЕНТЯБРЬ','ОКТЯБРЬ','НОЯБРЬ','ДЕКАБРЬ'];
const PLACE_PERCENTS = {100:100,80:80,65:65,50:50,40:40,30:30,25:25,20:20,15:15};

let now = new Date();
let currentMonth = now.getMonth();
let currentYear = now.getFullYear();

function getStore() {
  try { return JSON.parse(localStorage.getItem('obshestvo_v2') || '{}'); } catch(e) { return {}; }
}
function saveStore(data) {
  localStorage.setItem('obshestvo_v2', JSON.stringify(data));
}
function getData() {
  let s = getStore();
  if (!s.players) s.players = ['Александр','Дмитрий','Михаил','Анна'];
  if (!s.results) s.results = [];
  return s;
}

function getMonthKey(m, y) { return y + '-' + String(m+1).padStart(2,'0'); }

function calcPoints(dayMax, placeVal) {
  if (placeVal === 'participation') return 15;
  return Math.round(dayMax * parseInt(placeVal) / 100);
}

function getRating(month, year) {
  let data = getData();
  let key = getMonthKey(month, year);
  let results = data.results.filter(r => r.monthKey === key);
  let map = {};
  results.forEach(r => {
    if (!map[r.player]) map[r.player] = { points: 0, games: 0 };
    map[r.player].points += r.points;
    map[r.player].games += 1;
  });
  return Object.entries(map).sort((a,b) => b[1].points - a[1].points);
}

function renderRating() {
  let label = MONTHS[currentMonth] + ' ' + currentYear;
  document.getElementById('month-label').textContent = label;
  let rating = getRating(currentMonth, currentYear);
  let el = document.getElementById('rating-content');

  if (rating.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="big">🃏</div><p>Результатов за этот месяц пока нет.<br>Они появятся после первого турнира.</p></div>';
    return;
  }

  let medals = ['🥇','🥈','🥉'];
  let rows = rating.map(([name, d], i) => {
    let placeClass = i < 3 ? 'place-' + (i+1) : '';
    let medal = i < 3 ? '<span class="medal">' + medals[i] + '</span>' : (i+1) + '.';
    let top10 = i < 10 ? '<span class="top10-badge">ТОП-10</span>' : '';
    return `<tr class="${placeClass}">
      <td>${medal}</td>
      <td><span class="player-name">${name}</span>${top10}<br><span class="player-games">${d.games} игр</span></td>
      <td><span class="points-big">${d.points}</span></td>
    </tr>`;
  }).join('');

  el.innerHTML = `<table class="rating-table">
    <thead><tr>
      <th style="width:36px;">#</th>
      <th style="text-align:left;padding-left:12px;">ИГРОК</th>
      <th>ОЧКИ</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderRating();
}

function renderPlayers() {
  let data = getData();
  let sel = document.getElementById('sel-player');
  sel.innerHTML = '<option value="">— выберите игрока —</option>';
  data.players.forEach(p => {
    sel.innerHTML += `<option value="${p}">${p}</option>`;
  });

  let list = document.getElementById('players-list');
  if (data.players.length === 0) {
    list.innerHTML = '<div style="color:#7A5C3A;font-size:13px;padding:8px;">Игроков пока нет</div>';
    return;
  }
  list.innerHTML = data.players.map(p => `
    <div class="player-item">
      <span class="player-item-name">${p}</span>
      <button class="btn-remove" onclick="removePlayer('${p}')">удалить</button>
    </div>`).join('');
}

function renderHistory() {
  let data = getData();
  let recent = [...data.results].reverse().slice(0, 10);
  let el = document.getElementById('history-list');
  if (recent.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:#7A5C3A;font-size:13px;padding:20px;">Записей пока нет</div>';
    return;
  }
  el.innerHTML = recent.map((r, i) => `
    <div class="history-item">
      <div>
        <div class="hi-name">${r.player}</div>
        <div class="hi-detail">${r.dayName} · ${r.placeName}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="hi-pts">+${r.points}</span>
        <button class="btn-undo" onclick="undoResult(${data.results.length - 1 - i})">отмена</button>
      </div>
    </div>`).join('');
}

function updatePreview() {
  let day = document.getElementById('sel-day').value;
  let place = document.getElementById('sel-place').value;
  let preview = document.getElementById('points-preview');
  if (day && place) {
    let pts = calcPoints(parseInt(day), place);
    document.getElementById('preview-pts').textContent = pts;
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
}

function addResult() {
  let dayEl = document.getElementById('sel-day');
  let playerEl = document.getElementById('sel-player');
  let placeEl = document.getElementById('sel-place');

  let dayMax = dayEl.value;
  let player = playerEl.value;
  let placeVal = placeEl.value;

  if (!dayMax || !player || !placeVal) { showToast('Заполните все поля'); return; }

  let pts = calcPoints(parseInt(dayMax), placeVal);
  let dayName = dayEl.options[dayEl.selectedIndex].text.split(' (')[0];
  let placeName = placeEl.options[placeEl.selectedIndex].text.split(' (')[0];

  let data = getData();
  data.results.push({
    player, points: pts, dayName, placeName,
    monthKey: getMonthKey(currentMonth, currentYear),
    ts: Date.now()
  });
  saveStore(data);

  dayEl.value = ''; playerEl.value = ''; placeEl.value = '';
  document.getElementById('points-preview').style.display = 'none';

  renderRating();
  renderHistory();
  showToast('✓ ' + player + ' — +' + pts + ' очков');
}

function undoResult(idx) {
  let data = getData();
  data.results.splice(idx, 1);
  saveStore(data);
  renderRating();
  renderHistory();
  showToast('Запись удалена');
}

function addPlayer() {
  let input = document.getElementById('new-player-input');
  let name = input.value.trim();
  if (!name) return;
  let data = getData();
  if (data.players.includes(name)) { showToast('Игрок уже есть'); return; }
  data.players.push(name);
  saveStore(data);
  input.value = '';
  renderPlayers();
  showToast('Игрок добавлен: ' + name);
}

function removePlayer(name) {
  let data = getData();
  data.players = data.players.filter(p => p !== name);
  saveStore(data);
  renderPlayers();
}

function showToast(msg) {
  let t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function checkPin() {
  let val = document.getElementById('pin-input').value;
  if (val === PIN) {
    document.getElementById('admin-lock-screen').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
    renderPlayers();
    renderHistory();
  } else {
    document.getElementById('pin-error').style.display = 'block';
  }
}

function logout() {
  document.getElementById('admin-lock-screen').style.display = 'block';
  document.getElementById('admin-content').style.display = 'none';
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-error').style.display = 'none';
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'rating') renderRating();
}

document.getElementById('pin-input').addEventListener('keyup', e => { if (e.key === 'Enter') checkPin(); });

renderRating();
</script>
</body>
</html>
