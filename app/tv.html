<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Общество · TV</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TV STYLES ─────────────────────────────────────────────── */

:root {
  --bg: #0e0e10;
  --dark2: #141418;
  --dark3: #1a1a20;
  --gold: #C9A96E;
  --gold2: #E8C98A;
  --gold3: rgba(201,169,110,0.5);
  --text: #F0EBE1;
  --text2: #B8AFA0;
  --text3: rgba(184,175,160,0.5);
  --ok: #5BAD6F;
  --err: #C0404A;
  --bordeaux: #8B1E3F;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  margin: 0; padding: 0;
  font-family: 'Montserrat', sans-serif;
  color: #F0EBE1;
  min-height: 100vh;
  background:
    radial-gradient(circle at 50% 20%, rgba(201,169,110,0.10), transparent 35%),
    radial-gradient(circle at 50% 100%, rgba(139,30,63,0.14), transparent 45%),
    #0e0e10;
  color: var(--text);
  font-family: 'Montserrat', 'Arial', sans-serif;
  min-height: 100vh;
  overflow: hidden;
}

/* ── TABS ────────────────────────────────────────────────────── */
.tv-tabs {
  display: flex;
  gap: 2px;
  padding: 8px 12px 0;
  background: var(--dark2);
  border-bottom: 1px solid rgba(201,169,110,0.15);
}

.tv-tab-btn {
  padding: 8px 20px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text3);
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.15s;
}

.tv-tab-btn:hover { color: var(--text2); }
.tv-tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── TAB CONTENT ─────────────────────────────────────────────── */
.tv-tab-content { display: none; height: calc(100vh - 44px); overflow: hidden; }
.tv-tab-content.active { display: flex; flex-direction: column; }

/* ── STATUS BAR ──────────────────────────────────────────────── */
.tv-status-bar {
  font-size: 9px;
  letter-spacing: 1.5px;
  padding: 4px 12px;
  text-align: right;
  color: var(--text3);
}
.tv-status-bar[data-status="ok"] { color: var(--ok); }
.tv-status-bar[data-status="local"] { color: var(--gold3); }
.tv-status-bar[data-status="offline"] { color: var(--err); }

/* ── TIMER TAB ───────────────────────────────────────────────── */
#tv-tab-timer {
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
  gap: 12px;
}

.tv-club-name {
  font-size: clamp(14px, 2vw, 22px);
  letter-spacing: 8px;
  color: var(--gold3);
  text-transform: uppercase;
}

.tv-phase-name {
  font-size: clamp(26px, 4vw, 52px);
  font-weight: 600;
  letter-spacing: 6px;
  color: var(--gold2);
}

.tv-timer-display {
  font-size: clamp(120px, 22vw, 260px);
  font-weight: 700;
  letter-spacing: -4px;
  text-shadow: 0 0 40px rgba(201,169,110,0.10);
  letter-spacing: -2px;
  color: var(--text);
  line-height: 1;
  font-variant-numeric: tabular-nums;
  transition: color 0.3s;
}

.tv-timer-display.tv-timer-warning { color: var(--err); }

.tv-blinds {
  font-size: clamp(42px, 7vw, 90px);
  font-weight: 600;
  letter-spacing: 5px;
  color: var(--gold);
}

.tv-ante {
  font-size: clamp(18px, 3vw, 38px);
  margin-top: -4px;
  letter-spacing: 3px;
}

.tv-next-level {
  font-size: clamp(13px, 1.8vw, 22px);
  opacity: 0.65;
  letter-spacing: 2px;
}

.tv-running-status {
  font-size: clamp(16px, 2vw, 24px);
  letter-spacing: 4px;
  color: var(--gold3);
}

.tv-registration {
  font-size: clamp(10px, 1.2vw, 14px);
  letter-spacing: 3px;
  padding: 4px 12px;
  border-radius: 3px;
}
.tv-reg-open { background: rgba(91,173,111,0.2); color: var(--ok); }
.tv-reg-closed { background: rgba(139,30,63,0.2); color: var(--bordeaux); }

/* ── SEATING TAB ─────────────────────────────────────────────── */
#tv-tab-seating {
  padding: 12px;
  overflow-y: auto;
}

.tv-seating-empty {
  text-align: center;
  padding: 80px 20px;
  font-size: clamp(16px, 2.5vw, 28px);
  letter-spacing: 4px;
  color: var(--text3);
}

.tv-final-banner {
  text-align: center;
  font-size: clamp(16px, 2.5vw, 32px);
  letter-spacing: 6px;
  color: var(--gold);
  padding: 12px;
  margin-bottom: 12px;
  border: 1px solid rgba(201,169,110,0.3);
  border-radius: 6px;
  background: rgba(201,169,110,0.05);
}

.tv-tables { display: flex; gap: 12px; flex-wrap: wrap; }
.tv-tables-1 .tv-table { flex: 1; max-width: 100%; }
.tv-tables-2 .tv-table { flex: 1; min-width: 45%; }
.tv-tables-3 .tv-table { flex: 1; min-width: 30%; }

.tv-table {
  background: var(--dark2);
  border: 1px solid rgba(201,169,110,0.15);
  border-radius: 8px;
  padding: 12px;
}

.tv-table-name {
  font-size: clamp(11px, 1.5vw, 16px);
  letter-spacing: 3px;
  color: var(--gold3);
  margin-bottom: 8px;
  text-align: center;
}

.tv-seats { display: flex; flex-direction: column; gap: 3px; }

.tv-seat {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 4px;
  font-size: clamp(12px, 1.6vw, 18px);
}

.tv-seat-taken { background: rgba(201,169,110,0.08); }
.tv-seat-empty { opacity: 0.3; }

.tv-seat-num {
  font-size: 0.75em;
  color: var(--text3);
  min-width: 18px;
}

.tv-seat-name { flex: 1; font-weight: 500; }

.tv-table-count {
  text-align: right;
  font-size: 10px;
  color: var(--text3);
  margin-top: 6px;
  letter-spacing: 1px;
}

.tv-seating-total {
  text-align: center;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text3);
  margin-top: 12px;
  padding-top: 8px;
  border-top: 1px solid rgba(201,169,110,0.1);
}

/* ── LITE MODE ───────────────────────────────────────────────── */
body.lite .tv-tabs { display: none; }
body.lite .tv-tab-content { height: 100vh; }
body.lite .tv-status-bar { display: none; }
body.lite .tv-club-name,
body.lite .tv-next-level,
body.lite .tv-registration { display: none; }

/* ── LITE TOGGLE ─────────────────────────────────────────────── */
#btn-lite {
  position: fixed;
  bottom: 8px;
  right: 8px;
  background: rgba(201,169,110,0.1);
  border: 1px solid rgba(201,169,110,0.2);
  color: var(--text3);
  font-family: inherit;
  font-size: 9px;
  letter-spacing: 2px;
  padding: 4px 8px;
  cursor: pointer;
  border-radius: 3px;
  z-index: 100;
}

/* ── АНИМАЦИЯ МИГАНИЯ ────────────────────────────────────────── */
@keyframes tv-flash-warn {
  0%, 100% { background: var(--bg); }
  50% { background: rgba(192,64,74,0.15); }
}
.tv-flash-warning { animation: tv-flash-warn 1s ease-in-out 3; }


/* ── TV TIMER CARD ─────────────────────────────────────── */
.tv-timer-card {
  width: min(1200px, 94vw);
  min-height: 72vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 42px 56px;
  border: 1px solid rgba(201,169,110,0.18);
  border-radius: 28px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.01)),
    rgba(20,20,24,0.52);
  box-shadow:
    0 30px 90px rgba(0,0,0,0.45),
    inset 0 0 60px rgba(201,169,110,0.035);
}

/* Lite mode */
body.lite .tv-timer-card {
  width: 100vw;
  min-height: 100vh;
  border: none;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
  padding: 20px;
}
body.lite #btn-lite { opacity: 0.08; }
body.lite #btn-lite:hover { opacity: 1; }
body.lite .tv-club-name { display: block; opacity: 0.45; }
body.lite .tv-next-level { display: none !important; }
body.lite .tv-registration { display: none !important; }
body.lite .tv-seat-empty { display: none; }
body.lite .tv-table { padding: 22px; border-radius: 18px; }
body.lite .tv-table-name { font-size: clamp(18px,2.5vw,34px); color: var(--gold); margin-bottom: 18px; }
body.lite .tv-seat { font-size: clamp(18px,2.4vw,34px); padding: 10px 14px; margin-bottom: 6px; }

/* ── ADDON OVERLAY ──────────────────────────────────────── */
.tv-addon-overlay {
  display: none;
  position: absolute;
  inset: 0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 50;
  gap: 28px;
  background:
    radial-gradient(circle at 50% 35%, rgba(201,169,110,0.16), transparent 38%),
    linear-gradient(180deg, rgba(10,8,6,0.98), rgba(14,14,16,0.98));
}
.tv-addon-title {
  font-size: clamp(38px, 6vw, 76px);
  font-weight: 700;
  letter-spacing: 8px;
  color: var(--gold);
  text-shadow: 0 0 32px rgba(201,169,110,0.16);
}
.tv-addon-subtitle {
  font-size: clamp(20px, 3.2vw, 44px);
  line-height: 1.35;
  letter-spacing: 4px;
  color: rgba(240,235,225,0.86);
  text-align: center;
  max-width: 90%;
}
.tv-addon-timer {
  margin-top: 12px;
  font-size: clamp(70px, 10vw, 130px);
  font-weight: 700;
  color: #fff;
  font-variant-numeric: tabular-nums;
  letter-spacing: 4px;
}

/* ── TIMER WARNING/DANGER ───────────────────────────────── */
.tv-timer-display.tv-timer-warning {
  color: var(--err);
  text-shadow: 0 0 38px rgba(192,64,74,0.22);
}
@keyframes timerDangerPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.025); opacity: 0.88; }
}
.tv-timer-danger {
  animation: timerDangerPulse 0.7s ease-in-out infinite;
}

/* ── FINAL TABLE ────────────────────────────────────────── */
.tv-final-banner {
  font-size: clamp(24px, 4vw, 54px);
  font-weight: 700;
  letter-spacing: 8px;
  padding: 20px;
  margin-bottom: 22px;
  border-radius: 18px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.12), transparent);
  border: 1px solid rgba(201,169,110,0.35);
  box-shadow: 0 0 40px rgba(201,169,110,0.08);
}
.tv-table-final {
  border-color: rgba(201,169,110,0.45) !important;
  box-shadow: 0 0 40px rgba(201,169,110,0.08) !important;
}

</style>
</head>

<script>


// ── config.js ──────────────────────────────
// ── APP CONFIG ────────────────────────────────────────────────

const APP_CONFIG = {
  cloudEnabled: true,
  cloudUrl: 'https://script.google.com/macros/s/AKfycbxzZbHSIZ_IAsD7i4z8CkSqmEkb-vyDAZGWQg_u5b-ClF1NHGMoKujMKrTAh27T6Fne/exec',
  cloudToken: 'obshestvo_tv_timer_2026_secret',
  cloudTimeout: 6000,
  env: 'prod'
};


// ── cloud-client.js ──────────────────────────────
// ── CLOUD CLIENT ───────────────────────────────────────────────
// Читает настройки из APP_CONFIG (src/core/config.js).
// Подключать ПОСЛЕ config.js.
//
// Если APP_CONFIG.cloudEnabled = false → localStorage mock.
// Если APP_CONFIG.cloudEnabled = true  → Google Script.

const cloud = (function() {
  const MOCK_PREFIX = 'obshestvo_cloud_mock_';

  function isEnabled() {
    if (typeof APP_CONFIG === 'undefined') return false;
    // Emergency local mode может временно отключить cloud
    if (APP_CONFIG._cloudOverride === false) return false;
    return APP_CONFIG.cloudEnabled;
  }

  function getUrl()   { return APP_CONFIG.cloudUrl; }
  function getToken() { return APP_CONFIG.cloudToken; }
  function getTimeout() {
    return (typeof APP_CONFIG !== 'undefined' && APP_CONFIG.cloudTimeout) || 6000;
  }

  // Fetch с таймаутом — П.6
  async function fetchWithTimeout(url, opts) {
    const timeout = getTimeout();
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeout);
    try {
      const res = await fetch(url, { ...opts, signal: controller.signal });
      return res;
    } finally {
      clearTimeout(timer);
    }
  }

  async function cloudGet(path) {
    if (!isEnabled()) {
      // Mock: читаем из localStorage
      const raw = localStorage.getItem(MOCK_PREFIX + path);
      if (!raw) return null;
      return JSON.parse(raw);
    }
    const url = getUrl() + '?path=' + encodeURIComponent(path) + '&token=' + getToken();
    const res = await fetchWithTimeout(url, { method: 'GET' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && data.error) throw new Error(data.error);
    return data;
  }

  async function cloudPost(path, data) {
    if (!isEnabled()) {
      // Mock: пишем в localStorage
      localStorage.setItem(MOCK_PREFIX + path, JSON.stringify(data));
      return { ok: true };
    }
    const url = getUrl() + '?token=' + getToken();
    const res = await fetchWithTimeout(url, {
      method: 'POST',
      body: JSON.stringify({ path, data, _token: getToken() }),
      headers: { 'Content-Type': 'text/plain' } // GAS требует text/plain для CORS
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const result = await res.json();
    if (result && result.error) throw new Error(result.error);
    return result;
  }

  return { cloudGet, cloudPost, isEnabled };
})();

function cloudGet(path)        { return cloud.cloudGet(path); }
function cloudPost(path, data) { return cloud.cloudPost(path, data); }
function cloudIsEnabled()      { return cloud.isEnabled(); }

      {type:'level', level:21, sb:40000, bb:80000,  ante:40000, duration:10*60},
      {type:'level', level:22, sb:50000, bb:100000, ante:50000, duration:10*60},
      {type:'level', level:23, sb:75000, bb:150000, ante:75000, duration:10*60},
    ]
  }
};

// ── HELPERS ────────────────────────────────────────────────────

function getStructure(id) {
  return TOURNAMENT_STRUCTURES[id] || TOURNAMENT_STRUCTURES.default;
}
function getPhases(structureId) {
  return getStructure(structureId).phases;
}
function getPhase(structureId, phaseIndex) {
  const phases = getPhases(structureId);
  return phases[Math.max(0, Math.min(phaseIndex, phases.length - 1))];
}
function getNextLevel(structureId, phaseIndex) {
  const phases = getPhases(structureId);
  for (let i = phaseIndex + 1; i < phases.length; i++) {
    if (phases[i].type === 'level') return phases[i];
  }
  return null;
}
function fmtChips(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(n%1000000?1:0)+'M';
  if (n >= 1000)    return (n/1000).toFixed(n%1000?1:0)+'K';
  return String(n);
}
function fmtTime(sec) {
  sec = Math.max(0, Math.ceil(Number(sec) || 0));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}


// ── timer-state.js ──────────────────────────────
// ── TIMER STATE ────────────────────────────────────────────────

const TIMER_STATE_VERSION = '2026-06-13-timer-v1';

const DEFAULT_TIMER_STATE = {
  version: TIMER_STATE_VERSION,
  structureId: 'default',
  phaseIndex: 0,
  running: false,
  startedAt: null,
  remainingSec: 12 * 60,
  finalMode: false,
  updatedAt: null,
  source: 'local'
};

function createTimerState(overrides) {
  return Object.assign({}, DEFAULT_TIMER_STATE, overrides || {});
}

// Merge: берём state с более свежим updatedAt
function mergeTimerState(local, cloud) {
  if (!local && !cloud) return createTimerState();
  if (!local) return cloud;
  if (!cloud) return local;
  const lt = local.updatedAt ? new Date(local.updatedAt).getTime() : 0;
  const ct = cloud.updatedAt ? new Date(cloud.updatedAt).getTime() : 0;
  if (lt >= ct) {
    console.log('[TIMER MERGE] local wins', local.updatedAt, 'phase='+local.phaseIndex);
    return local;
  }
  console.log('[TIMER MERGE] cloud wins', cloud.updatedAt, 'phase='+cloud.phaseIndex);
  return cloud;
}

// ── TIMER STORAGE ──────────────────────────────────────────────

const TIMER_LS_KEY = 'obshestvo_timer_state_v1';

function saveLocalTimerState(state) {

// ── timer-engine.js (absolute time + catchUp) ──
// ── TIMER ENGINE ───────────────────────────────────────────────
// Таймер работает по АБСОЛЮТНОМУ времени — не теряет уровни при сне устройства.
//
// Модель:
//   admin-timer.html = writer (source: 'admin', обновляет updatedAt)
//   tv.html = reader  (source: 'tv-preview', НЕ обновляет updatedAt)
//
// Ключевые поля состояния:
//   phaseStartedAt — ISO когда началась текущая фаза
//   remainingSec   — секунд осталось (пересчитывается из phaseStartedAt)
//   running        — идёт ли таймер

let _timerState = null;
let _autoAdvanceTimeout = null;
let _autoPhaseLock = false;
let _isAdminWriter = false;

function initTimerEngine(isWriter) {
  _isAdminWriter = !!isWriter;
  _timerState = loadLocalTimerState() || createTimerState();
  // При инициализации догоняем пропущенные уровни (если устройство спало)
  if (_timerState.running) {
    catchUpPhases(_timerState);
    scheduleAutoAdvance();
  }
}

function getTimerState() { return _timerState; }
function setTimerState(state) { _timerState = state; }

// ── АБСОЛЮТНОЕ ВРЕМЯ ──────────────────────────────────────────
// Реальный остаток секунд с учётом прошедшего времени с phaseStartedAt
function getRemainingSec(state) {
  if (!state) return 0;
  const base = Number(state.remainingSec || 0);
  const startIso = state.phaseStartedAt || state.startedAt;
  if (state.running && startIso) {
    const elapsed = (Date.now() - new Date(startIso).getTime()) / 1000;
    return Math.max(0, Math.ceil(base - elapsed));
  }
  return Math.max(0, Math.ceil(base));
}

// Догоняем пропущенные уровни (если устройство спало или страница была закрыта)
function catchUpPhases(state) {
  if (!state || !state.running || !state.phaseStartedAt) return;
  const phases = getPhases(state.structureId);
  let catchupCount = 0;

  while (true) {
    const rem = getRemainingSec(state);
    if (rem > 0) break; // текущий уровень ещё не закончился

    if (state.phaseIndex >= phases.length - 1) {
      // Конец турнира
      state.running = false;
      state.startedAt = null;
      state.phaseStartedAt = null;
      state.remainingSec = 0;
      console.log('[CATCHUP] tournament ended during sleep');
      break;
    }

    // Переходим на следующий уровень
    const currentPhase = phases[state.phaseIndex];
    const currentDuration = state.finalMode && currentPhase.type === 'level'
      ? 6 * 60
      : currentPhase.duration;
    const nextIdx = state.phaseIndex + 1;
    const nextPhase = phases[nextIdx];
    const nextDuration = state.finalMode && nextPhase.type === 'level' ? 6*60 : nextPhase.duration;

    // Новый старт = старый старт + длительность ТЕКУЩЕЙ фазы (не следующей)
    const newStart = new Date(state.phaseStartedAt).getTime() + currentDuration * 1000;

    state.phaseIndex = nextIdx;
    state.remainingSec = nextDuration;
    state.phaseStartedAt = new Date(newStart).toISOString();
    catchupCount++;

    if (catchupCount > 50) {
      console.warn('[CATCHUP] too many phases, stopping');
      break;
    }
  }

  if (catchupCount > 0) {
    console.log('[CATCHUP] caught up', catchupCount, 'phases, now at phase', state.phaseIndex);
    state.updatedAt = new Date().toISOString();
    state.source = _isAdminWriter ? 'admin' : 'tv-preview';
  }
}

// ── ОПЕРАЦИИ (только для admin-writer) ─────────────────────────

function timerStart() {
  if (!_timerState || _timerState.running) return;
  _timerState.running = true;
  _timerState.startedAt = new Date().toISOString();
  _timerState.phaseStartedAt = new Date().toISOString();
  _timerState.updatedAt = new Date().toISOString();
  _timerState.source = 'admin';
  _persistTimerState('start');
  scheduleAutoAdvance();
}

function timerPause() {
  if (!_timerState || !_timerState.running) return;
  _timerState.remainingSec = getRemainingSec(_timerState);
  _timerState.running = false;
  _timerState.startedAt = null;
  _timerState.phaseStartedAt = null;
  _timerState.updatedAt = new Date().toISOString();
  _timerState.source = 'admin';
  cancelAutoAdvance();
  _persistTimerState('pause');
}

function timerNext() {
  if (!_timerState) return;
  const phases = getPhases(_timerState.structureId);
  _applyPhaseChange(Math.min(phases.length - 1, _timerState.phaseIndex + 1), 'manual_next');
}

function timerPrev() {
  if (!_timerState) return;
  _applyPhaseChange(Math.max(0, _timerState.phaseIndex - 1), 'manual_prev');
}

function timerResetCurrentPhase() {
  if (!_timerState) return;
  const phase = getPhase(_timerState.structureId, _timerState.phaseIndex);
  _timerState.remainingSec = _timerState.finalMode && phase.type==='level' ? 6*60 : phase.duration;
  _timerState.startedAt = _timerState.running ? new Date().toISOString() : null;
  _timerState.phaseStartedAt = _timerState.running ? new Date().toISOString() : null;
  _timerState.updatedAt = new Date().toISOString();
  _timerState.source = 'admin';
  cancelAutoAdvance();
  _persistTimerState('reset_phase');
  if (_timerState.running) scheduleAutoAdvance();
}

function timerResetAll(structureId) {
  cancelAutoAdvance();
  _timerState = createTimerState({
    structureId: structureId || 'default',
    updatedAt: new Date().toISOString(),
    source: 'admin'
  });
  _persistTimerState('reset_all');
}

function timerSetStructure(structureId) {
  if (!TOURNAMENT_STRUCTURES[structureId]) return;
  cancelAutoAdvance();
  _timerState = createTimerState({
    structureId,
    updatedAt: new Date().toISOString(),
    source: 'admin'
  });
  _persistTimerState('structure_change:' + structureId);
}

function timerSetFinalMode(enabled) {
  if (!_timerState) return;
  _timerState.finalMode = enabled;
  const phase = getPhase(_timerState.structureId, _timerState.phaseIndex);
  if (phase && phase.type === 'level') {
    _timerState.remainingSec = enabled ? 6*60 : phase.duration;
    _timerState.startedAt = _timerState.running ? new Date().toISOString() : null;
    _timerState.phaseStartedAt = _timerState.running ? new Date().toISOString() : null;
  }
  _timerState.updatedAt = new Date().toISOString();
  _timerState.source = 'admin';
  cancelAutoAdvance();
  _persistTimerState(enabled ? 'final_mode_on' : 'final_mode_off');
  if (_timerState.running) scheduleAutoAdvance();
}

function timerGoToLevel(level) {
  if (!_timerState) return;
  const phases = getPhases(_timerState.structureId);
  const idx = phases.findIndex(p => p.type === 'level' && p.level === level);
  if (idx < 0) return;
  _applyPhaseChange(idx, 'goto_level_' + level);
}

// ── ВНУТРЕННИЕ ────────────────────────────────────────────────

function _applyPhaseChange(newIdx, reason) {
  if (!_timerState) return;
  const phase = getPhase(_timerState.structureId, newIdx);
  if (!phase) return;
  _timerState.phaseIndex = newIdx;
  _timerState.remainingSec = _timerState.finalMode && phase.type==='level' ? 6*60 : phase.duration;
  _timerState.startedAt = _timerState.running ? new Date().toISOString() : null;
  _timerState.phaseStartedAt = _timerState.running ? new Date().toISOString() : null;
  _timerState.updatedAt = new Date().toISOString();
  _timerState.source = 'admin';
  cancelAutoAdvance();
  _persistTimerState(reason);
  if (_timerState.running) scheduleAutoAdvance();
}

function _persistTimerState(reason) {
  if (!_timerState) return;
  saveLocalTimerState(_timerState);
  if (typeof renderTimerTV === 'function') renderTimerTV(_timerState);
  if (typeof renderTimerAdmin === 'function') renderTimerAdmin(_timerState);
  if (_isAdminWriter) saveCloudTimerStateDebounced(_timerState, reason);
}

// ── AUTO-ADVANCE ──────────────────────────────────────────────
// Использует абсолютное время — не теряет уровни при сне устройства

function scheduleAutoAdvance() {
  cancelAutoAdvance();
  if (!_timerState || !_timerState.running) return;

  // Сначала догоняем пропущенные уровни
  catchUpPhases(_timerState);

  const rem = getRemainingSec(_timerState);
  if (rem <= 1.5) {
    setTimeout(autoNextPhase, 0);
    return;
  }
  _autoAdvanceTimeout = setTimeout(autoNextPhase, Math.max(100, (rem - 0.5) * 1000));
  console.log('[AUTO-ADVANCE] scheduled in', Math.round(rem), 'sec, phase:', _timerState.phaseIndex, 'writer:', _isAdminWriter);
}

function cancelAutoAdvance() {
  if (_autoAdvanceTimeout) {
    clearTimeout(_autoAdvanceTimeout);
    _autoAdvanceTimeout = null;
  }
}

function autoNextPhase() {
  if (_autoPhaseLock) return;
  if (!_timerState || !_timerState.running) return;
  _autoPhaseLock = true;

  const beforeIdx = _timerState.phaseIndex;

  // Догоняем все пропущенные уровни (если setTimeout сработал поздно)
  catchUpPhases(_timerState);

  // Если catchUpPhases уже сам перевёл фазу — не делаем ещё один переход
  if (_timerState.phaseIndex !== beforeIdx) {
    if (_isAdminWriter) {
      _timerState.updatedAt = new Date().toISOString();
      _timerState.source = 'admin';
      _persistTimerState('catchup_only');
    } else {
      saveLocalTimerState(_timerState);
      if (typeof renderTimerTV === 'function') renderTimerTV(_timerState);
    }
    _autoPhaseLock = false;
    scheduleAutoAdvance();
    return;
  }

  const phases = getPhases(_timerState.structureId);
  const currentIdx = _timerState.phaseIndex;

  if (!_timerState.running) {
    // catchUpPhases мог остановить таймер (конец турнира)
    if (_isAdminWriter) {
      _timerState.updatedAt = new Date().toISOString();
      _timerState.source = 'admin';
      _persistTimerState('tournament_end');
    } else {
      saveLocalTimerState(_timerState);
      if (typeof renderTimerTV === 'function') renderTimerTV(_timerState);
    }
    _autoPhaseLock = false;
    return;
  }

  if (currentIdx >= phases.length - 1) {
    _timerState.running = false;
    _timerState.startedAt = null;
    _timerState.phaseStartedAt = null;
    _timerState.remainingSec = 0;

    if (_isAdminWriter) {
      _timerState.updatedAt = new Date().toISOString();
      _timerState.source = 'admin';
      _persistTimerState('tournament_end');
    } else {
      saveLocalTimerState(_timerState);
      if (typeof renderTimerTV === 'function') renderTimerTV(_timerState);
    }
    _autoPhaseLock = false;
    return;
  }

  // Переход на следующую фазу
  const nextIdx = currentIdx + 1;
  const nextPhase = phases[nextIdx];
  _timerState.phaseIndex = nextIdx;
  _timerState.remainingSec = _timerState.finalMode && nextPhase.type==='level' ? 6*60 : nextPhase.duration;
  _timerState.phaseStartedAt = new Date().toISOString();
  _timerState.startedAt = _timerState.phaseStartedAt;

  if (_isAdminWriter) {
    _timerState.updatedAt = new Date().toISOString();
    _timerState.source = 'admin';
    saveLocalTimerState(_timerState);
    if (typeof renderTimerTV === 'function') renderTimerTV(_timerState);
    if (typeof renderTimerAdmin === 'function') renderTimerAdmin(_timerState);
    saveCloudTimerStateDebounced(_timerState, 'auto_next');
  } else {
    _timerState.source = 'tv-preview';
    saveLocalTimerState(_timerState);
    if (typeof renderTimerTV === 'function') renderTimerTV(_timerState);
    console.log('[TV PREVIEW] local advance to phase', nextIdx);
  }

  _autoPhaseLock = false;
  scheduleAutoAdvance();
}

// ── CLOUD REFRESH ─────────────────────────────────────────────

function applyCloudTimerState(cloudState) {
  if (!cloudState) return;

  // TV: защита от отката при tv-preview
  if (!_isAdminWriter && _timerState) {
    const cloudSrc = cloudState.source || '';
    const localSrc = _timerState.source || '';

    if (cloudSrc === 'admin' && localSrc === 'tv-preview') {
      const lt = _timerState.updatedAt ? new Date(_timerState.updatedAt).getTime() : 0;
      const ct = cloudState.updatedAt ? new Date(cloudState.updatedAt).getTime() : 0;

      if (ct > lt) {
        console.log('[TV] new admin command wins, phase:', cloudState.phaseIndex);
        _timerState = cloudState;
        // Догоняем пропущенные уровни в cloud state
        if (_timerState.running) catchUpPhases(_timerState);
        saveLocalTimerState(_timerState);
        cancelAutoAdvance();
        if (typeof renderTimerTV === 'function') renderTimerTV(_timerState);
        if (_timerState.running) scheduleAutoAdvance();
      } else {
        console.log('[TV] old cloud ignored, keeping tv-preview phase:', _timerState.phaseIndex);
      }
      return;
    }
  }

  // Стандартный merge по updatedAt
  const merged = mergeTimerState(_timerState, cloudState);
  if (merged === _timerState) return;
  _timerState = merged;
  // Догоняем после merge
  if (_timerState.running) catchUpPhases(_timerState);
  saveLocalTimerState(_timerState);
  cancelAutoAdvance();
  if (typeof renderTimerTV === 'function') renderTimerTV(_timerState);
  if (typeof renderTimerAdmin === 'function') renderTimerAdmin(_timerState);
  if (_timerState.running) scheduleAutoAdvance();
}


// ── timer-cloud.js ──────────────────────────────
// ── TIMER CLOUD ────────────────────────────────────────────────
// Только admin-timer.html пишет в cloud.
// TV только читает.
//
// Save queue: если save уже идёт, pending-флаг не даёт потерять
// новое состояние — оно уйдёт сразу после завершения текущего save.

let _timerCloudTimer   = null;
let _timerCloudSaving  = false;
let _timerCloudPending = false;
let _timerCloudPendingReason = null;

function saveCloudTimerStateDebounced(state, reason) {
  reason = reason || 'unknown';
  if (_timerCloudTimer) clearTimeout(_timerCloudTimer);
  _timerCloudTimer = setTimeout(function() {
    _timerCloudTimer = null;
    _saveCloudTimerState(getTimerState(), reason);
  }, 600);
}

async function _saveCloudTimerState(state, reason) {
  // Если save уже идёт — запомнить pending, не терять последнее состояние
  if (_timerCloudSaving) {
    _timerCloudPending = true;
    _timerCloudPendingReason = reason;
    console.log('[TIMER CLOUD] pending save queued:', reason);
    return;
  }

  _timerCloudSaving = true;
  _timerCloudPending = false;

  const sz = JSON.stringify(state).length;
  console.log('[TIMER CLOUD SAVE]', reason, new Date().toISOString(), 'size:'+sz);

  try {
    await cloudPost('timer-state', state);
    setTimerCloudStatus('ok');
    console.log('[TIMER CLOUD SAVE OK]', reason);
  } catch(e) {
    console.error('[TIMER CLOUD SAVE ERR]', {reason, message: e.message, size: sz});
    setTimerCloudStatus('local'); // таймер продолжает работать
  } finally {
    _timerCloudSaving = false;
    // Если пришёл новый запрос пока сохраняли — отправить актуальное состояние
    if (_timerCloudPending) {
      const pendingReason = _timerCloudPendingReason || 'pending';
      _timerCloudPending = false;
      _timerCloudPendingReason = null;
      console.log('[TIMER CLOUD] executing pending save:', pendingReason);
      _saveCloudTimerState(getTimerState(), pendingReason);
    }
  }
}

async function loadCloudTimerState() {
  try {
    const state = await cloudGet('timer-state');
    setTimerCloudStatus('ok');
    return state;
  } catch(e) {
    console.warn('[TIMER CLOUD LOAD ERR]', e.message);
    setTimerCloudStatus('offline');
    return null;
  }
}

// ── СТАТУСЫ ────────────────────────────────────────────────────
let _timerStatusEl = null;
function setTimerStatusElement(el) { _timerStatusEl = el; }

function setTimerCloudStatus(status) {
  if (!_timerStatusEl) return;
  const cloudEnabled = typeof cloudIsEnabled === 'function' && cloudIsEnabled();
  let text, dataStatus;
  if (!cloudEnabled) {
    text = '● ТАЙМЕР · ЛОКАЛЬНЫЙ ТЕСТ';
    dataStatus = 'local';
  } else if (status === 'ok') {
    text = '● ТАЙМЕР · ОНЛАЙН';
    dataStatus = 'ok';
  } else {
    text = '● ТАЙМЕР · ОБЛАКО НЕДОСТУПНО · ОТСЧЁТ ИДЁТ';
    dataStatus = 'offline';
  }
  _timerStatusEl.textContent = text;
  _timerStatusEl.dataset.status = dataStatus;
}


// ── timer-render-tv.js ──────────────────────────────
// ── TIMER RENDER TV ────────────────────────────────────────────
// Только рисует. Не меняет состояние.

function renderTimerTV(state) {
  if (!state) return;

  const phase = getPhase(state.structureId, state.phaseIndex);
  const rem = getRemainingSec(state);
  const nextLevel = getNextLevel(state.structureId, state.phaseIndex);

  // Главный таймер
  const timerEl = document.getElementById('tv-timer-display');
  if (timerEl) {
    timerEl.textContent = fmtTime(rem);
    timerEl.className = 'tv-timer-display'
      + (rem <= 30 && state.running ? ' tv-timer-warning' : '')
      + (rem <= 10 && state.running ? ' tv-timer-danger' : '');
  }
  // Таймер в addon overlay
  const addonTimerEl = document.getElementById('tv-addon-timer');
  if (addonTimerEl) addonTimerEl.textContent = fmtTime(rem);

  // ADDON BREAK — специальный экран
  const isAddon = phase && phase.type === 'break' && phase.addon === true;
  const addonEl = document.getElementById('tv-addon-overlay');
  if (addonEl) addonEl.style.display = isAddon ? 'flex' : 'none';

  // Название фазы
  const phaseNameEl = document.getElementById('tv-phase-name');
  if (phaseNameEl) {
    if (state.finalMode && phase && phase.type === 'level') {
      phaseNameEl.textContent = 'ФИНАЛЬНЫЙ СТОЛ';
    } else if (isAddon) {
      phaseNameEl.textContent = 'АДД-ОН ПЕРЕРЫВ';
    } else if (phase) {
      phaseNameEl.textContent = phase.type === 'break' ? (phase.title || 'ПЕРЕРЫВ') : 'УРОВЕНЬ ' + phase.level;
    }
  }

  // Блайнды — скрываем на аддон-перерыве
  const blindsEl = document.getElementById('tv-blinds');
  if (blindsEl && phase) {
    if (isAddon) {
      blindsEl.textContent = '';
    } else if (phase.type === 'level') {
      blindsEl.textContent = fmtChips(phase.sb) + ' / ' + fmtChips(phase.bb);
    } else if (phase.type === 'break') {
      blindsEl.textContent = nextLevel ? fmtChips(nextLevel.sb) + ' / ' + fmtChips(nextLevel.bb) : '—';
    }
  }

  // Анте — скрываем на аддон-перерыве
  const anteEl = document.getElementById('tv-ante');
  if (anteEl && phase) {
    if (isAddon) {
      anteEl.style.display = 'none';
    } else if (phase.type === 'level' && phase.ante) {
      anteEl.textContent = 'АНТЕ ' + fmtChips(phase.ante);
      anteEl.style.display = '';
    } else if (phase.type === 'break' && nextLevel && nextLevel.ante) {
      anteEl.textContent = 'АНТЕ ' + fmtChips(nextLevel.ante);
      anteEl.style.display = '';
    } else {
      anteEl.style.display = 'none';
    }
  }

  // Следующий уровень — скрываем на аддон-перерыве
  const nextEl = document.getElementById('tv-next-level');
  if (nextEl) {
    if (isAddon) {
      nextEl.style.display = 'none';
    } else if (nextLevel) {
      nextEl.textContent = 'Следующий: ' + fmtChips(nextLevel.sb) + '/' + fmtChips(nextLevel.bb) + (nextLevel.ante ? ' анте '+fmtChips(nextLevel.ante) : '');
      nextEl.style.display = '';
    } else {
      nextEl.textContent = 'Финальный уровень';
      nextEl.style.display = '';
    }
  }

  // Статус (работает / пауза)
  const runningEl = document.getElementById('tv-running-status');
  if (runningEl) {

// ── seating-state.js ──────────────────────────────
// ── SEATING STATE ──────────────────────────────────────────────

const SEATING_STATE_VERSION = '2026-06-13-seating-v1';

const DEFAULT_SEATING_STATE = {
  version: SEATING_STATE_VERSION,
  tables: [],
  players: [],
  finalTable: false,
  updatedAt: null,
  source: 'local'
};

function createSeatingState(overrides) {
  return Object.assign({}, DEFAULT_SEATING_STATE, overrides || {});
}

function mergeSeatingState(local, cloud) {
  if (!local && !cloud) return createSeatingState();
  if (!local) return cloud;
  if (!cloud) return local;
  const lt = local.updatedAt ? new Date(local.updatedAt).getTime() : 0;
  const ct = cloud.updatedAt ? new Date(cloud.updatedAt).getTime() : 0;
  if (lt >= ct) {
    console.log('[SEATING MERGE] local wins', local.updatedAt);
    return local;
  }
  console.log('[SEATING MERGE] cloud wins', cloud.updatedAt);
  return cloud;
}

// Считает количество игроков за столами
function countSeatedPlayers(state) {
  if (!state || !state.tables) return 0;
  return state.tables.reduce((sum, t) => sum + t.seats.filter(s => s.player).length, 0);
}

// Считает свободные места
function countFreeSeats(state) {
  if (!state || !state.tables) return 0;
  return state.tables.reduce((sum, t) => sum + t.seats.filter(s => !s.player).length, 0);
}

// ── SEATING STORAGE ────────────────────────────────────────────

const SEATING_LS_KEY = 'obshestvo_seating_state_v1';

function saveLocalSeatingState(state) {
  try { localStorage.setItem(SEATING_LS_KEY, JSON.stringify(state)); } catch(e) {}
}

function loadLocalSeatingState() {
  try {
    const raw = localStorage.getItem(SEATING_LS_KEY);
    if (!raw) return null;

// ── seating-engine.js ──────────────────────────────
// ── SEATING ENGINE ─────────────────────────────────────────────

const MAX_TABLES = 3;
const MAX_SEATS = 10;
const MAX_PLAYERS = MAX_TABLES * MAX_SEATS; // 30

let _seatingState = null;
let _isSeatingWriter = false;

function initSeatingEngine(isWriter) {
  _isSeatingWriter = !!isWriter;
  _seatingState = loadLocalSeatingState() || createSeatingState();
}

function getSeatingState() { return _seatingState; }

// Генерация рассадки
function generateSeating(players, tableCount) {
  if (!players || !players.length) return null;
  tableCount = Math.min(tableCount || optimalTableCount(players.length), MAX_TABLES);

  // Перемешиваем
  const shuffled = players.slice().sort(() => Math.random() - 0.5);

  const tables = [];
  for (let i = 0; i < tableCount; i++) {
    tables.push({
      id: 'table-' + (i + 1),
      name: 'Стол ' + (i + 1),
      seats: Array.from({length: MAX_SEATS}, (_, j) => ({seat: j + 1, player: null}))
    });
  }

  // Распределяем по столам
  shuffled.forEach((player, idx) => {
    const tableIdx = idx % tableCount;
    const seatIdx = tables[tableIdx].seats.findIndex(s => !s.player);
    if (seatIdx >= 0) tables[tableIdx].seats[seatIdx].player = player;
  });

  return tables;
}

function optimalTableCount(playerCount) {
  if (playerCount <= 10) return 1;
  if (playerCount <= 20) return 2;
  return 3;
}

// Применить новую рассадку
function applySeating(players, tableCount) {
  const tables = generateSeating(players, tableCount);
  if (!tables) { showSeatingError('Нет игроков'); return; }
  _seatingState = createSeatingState({
    tables,
    players: players.slice(),
    finalTable: false,
    updatedAt: new Date().toISOString(),
    source: 'local'
  });
  _persistSeatingState('generate');
}

// Добавить опоздавшего
function addLatePlayer(name) {
  if (!_seatingState) return false;
  if (_seatingState.players.includes(name)) return false;
  if (countSeatedPlayers(_seatingState) >= MAX_PLAYERS) return false;

  // Найти свободное место
  for (const table of _seatingState.tables) {
    const seat = table.seats.find(s => !s.player);
    if (seat) {
      seat.player = name;
      _seatingState.players.push(name);
      _seatingState.updatedAt = new Date().toISOString();
      _persistSeatingState('add_late:' + name);
      return true;
    }
  }
  return false; // нет мест
}

// Убрать игрока
function removePlayerFromSeating(name) {
  if (!_seatingState) return;
  _seatingState.players = _seatingState.players.filter(p => p !== name);
  for (const table of _seatingState.tables) {
    for (const seat of table.seats) {
      if (seat.player === name) seat.player = null;
    }
  }
  _seatingState.updatedAt = new Date().toISOString();
  _persistSeatingState('remove:' + name);
}

// Включить финальный стол
function setFinalTable(enabled) {
  if (!_seatingState) return;
  _seatingState.finalTable = enabled;
  _seatingState.updatedAt = new Date().toISOString();
  _persistSeatingState('final_table:' + enabled);
}

// Очистить рассадку
function clearSeating() {
  _seatingState = createSeatingState({updatedAt: new Date().toISOString()});
  _persistSeatingState('clear');
}

function _persistSeatingState(reason) {
  if (!_seatingState) return;
  saveLocalSeatingState(_seatingState);
  if (typeof renderSeatingTV === 'function') renderSeatingTV(_seatingState);
  if (typeof renderSeatingAdmin === 'function') renderSeatingAdmin(_seatingState);
  if (_isSeatingWriter) saveCloudSeatingStateDebounced(_seatingState, reason);
}

// Применить cloud state
function applyCloudSeatingState(cloudState) {
  if (!cloudState) return;
  const merged = mergeSeatingState(_seatingState, cloudState);
  if (merged === _seatingState) return;
  _seatingState = merged;
  saveLocalSeatingState(_seatingState);
  if (typeof renderSeatingTV === 'function') renderSeatingTV(_seatingState);
  if (typeof renderSeatingAdmin === 'function') renderSeatingAdmin(_seatingState);
}

function showSeatingError(msg) {
  console.warn('[SEATING]', msg);
}


// ── seating-cloud.js ──────────────────────────────
// ── SEATING CLOUD ──────────────────────────────────────────────
// Save queue с pending-флагом — последнее состояние не теряется
// даже если admin быстро нажал несколько действий подряд.

let _seatingCloudTimer   = null;
let _seatingCloudSaving  = false;
let _seatingCloudPending = false;
let _seatingCloudPendingReason = null;

function saveCloudSeatingStateDebounced(state, reason) {
  if (_seatingCloudTimer) clearTimeout(_seatingCloudTimer);
  _seatingCloudTimer = setTimeout(function() {
    _seatingCloudTimer = null;
    _saveCloudSeatingState(getSeatingState(), reason || 'unknown');
  }, 800);
}

async function _saveCloudSeatingState(state, reason) {
  if (_seatingCloudSaving) {
    _seatingCloudPending = true;
    _seatingCloudPendingReason = reason;
    console.log('[SEATING CLOUD] pending save queued:', reason);
    return;
  }

  _seatingCloudSaving = true;
  _seatingCloudPending = false;

  console.log('[SEATING CLOUD SAVE]', reason, new Date().toISOString());
  try {
    await cloudPost('seating-state', state);
    setSeatingCloudStatus('ok');
    console.log('[SEATING CLOUD SAVE OK]', reason);
  } catch(e) {
    console.error('[SEATING CLOUD SAVE ERR]', e.message);
    setSeatingCloudStatus('local');
  } finally {
    _seatingCloudSaving = false;
    if (_seatingCloudPending) {
      const pendingReason = _seatingCloudPendingReason || 'pending';
      _seatingCloudPending = false;
      _seatingCloudPendingReason = null;
      console.log('[SEATING CLOUD] executing pending save:', pendingReason);
      _saveCloudSeatingState(getSeatingState(), pendingReason);
    }
  }
}

async function loadCloudSeatingState() {
  try {
    const state = await cloudGet('seating-state');
    setSeatingCloudStatus('ok');
    return state;
  } catch(e) {
    console.warn('[SEATING CLOUD LOAD ERR]', e.message);
    setSeatingCloudStatus('offline');
    return null;
  }
}

// ── СТАТУСЫ ────────────────────────────────────────────────────
let _seatingStatusEl = null;
function setSeatingStatusElement(el) { _seatingStatusEl = el; }

function setSeatingCloudStatus(status) {
  if (!_seatingStatusEl) return;
  const cloudEnabled = typeof cloudIsEnabled === 'function' && cloudIsEnabled();
  let text, dataStatus;
  if (!cloudEnabled) {
    text = '● РАССАДКА · ЛОКАЛЬНЫЙ ТЕСТ';
    dataStatus = 'local';
  } else if (status === 'ok') {
    text = '● РАССАДКА · ОНЛАЙН';
    dataStatus = 'ok';
  } else {
    text = '● РАССАДКА · ПОСЛЕДНЯЯ СОХРАНЁННАЯ';
    dataStatus = 'offline';
  }
  _seatingStatusEl.textContent = text;
  _seatingStatusEl.dataset.status = dataStatus;
}


// ── seating-render-tv.js ──────────────────────────────
// ── SEATING RENDER TV ──────────────────────────────────────────

function renderSeatingTV(state) {
  const cont = document.getElementById('tv-seating-content');
  if (!cont) return;

  if (!state || !state.tables || !state.tables.length) {
    cont.innerHTML = '<div class="tv-seating-empty">РАССАДКА ЕЩЁ НЕ ГОТОВА</div>';
    return;
  }

  const isFinal = state.finalTable;
  const tables = state.tables;

  // Считаем максимальное количество игроков за столом для масштабирования
  const maxPlayers = Math.max(...tables.map(t => t.seats.filter(s => s.player).length));
  const tableCount = tables.length;

  let html = '';

  if (isFinal) {
    html += '<div class="tv-final-banner">🏆 ФИНАЛЬНЫЙ СТОЛ</div>';
  }

  html += '<div class="tv-tables tv-tables-' + tableCount + '">';

  for (const table of tables) {
    const seated = table.seats.filter(s => s.player);
    const free = table.seats.filter(s => !s.player);

    html += `<div class="tv-table ${isFinal ? 'tv-table-final' : ''}">`;
    html += `<div class="tv-table-name">${escHtml(table.name)}</div>`;
    html += '<div class="tv-seats">';

    for (const seat of table.seats) {
      if (seat.player) {
        html += `<div class="tv-seat tv-seat-taken">
          <span class="tv-seat-num">${seat.seat}</span>
          <span class="tv-seat-name">${escHtml(seat.player)}</span>
        </div>`;
      } else {
        html += `<div class="tv-seat tv-seat-empty">
          <span class="tv-seat-num">${seat.seat}</span>
          <span class="tv-seat-name">—</span>
        </div>`;
      }
    }

    html += '</div>'; // tv-seats
    html += `<div class="tv-table-count">${seated.length} / ${table.seats.length}</div>`;
    html += '</div>'; // tv-table
  }

  html += '</div>'; // tv-tables

  // Общий счёт
  const total = tables.reduce((s, t) => s + t.seats.filter(x => x.player).length, 0);
  html += `<div class="tv-seating-total">Всего за столами: ${total}</div>`;

  cont.innerHTML = html;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}


// ── seating-render-admin.js ──────────────────────────────
// ── SEATING RENDER ADMIN ───────────────────────────────────────
// data-player + делегирование вместо inline onclick с именем.
// Безопасно для имён с апострофом, кавычками и спецсимволами.

// Инициализация делегирования — вызвать один раз при загрузке
function initSeatingAdminEvents() {
  const list = document.getElementById('admin-player-list');
  if (!list) return;
  // Делегирование: один обработчик на весь список
  list.addEventListener('click', function(e) {
    const btn = e.target.closest('.btn-remove');
    if (!btn) return;
    const name = btn.dataset.player;
    if (name !== undefined) {
      removePlayerFromSeating(name);
      updateLatePlayerSelect && updateLatePlayerSelect();
    }
  });
}

function renderSeatingAdmin(state) {
  // Preview рассадки
  const preview = document.getElementById('admin-seating-preview');
  if (preview) {
    if (!state || !state.tables || !state.tables.length) {
      preview.innerHTML = '<div class="admin-no-seating" style="font-size:10px;color:var(--text3);">Рассадка не создана</div>';
    } else {
      let html = '';
      for (const table of state.tables) {
        const players = table.seats.filter(s => s.player).map(s => escHtmlAdmin(s.player));
        html += `<div class="admin-table-preview" style="margin-bottom:4px;">
          <strong style="color:var(--text2);">${escHtmlAdmin(table.name)}</strong>:
          ${players.length ? players.join(', ') : '<em style="color:var(--text3);">пусто</em>'}
        </div>`;
      }
      preview.innerHTML = html;
    }
  }

  // Список игроков
  const playerList = document.getElementById('admin-player-list');
  if (playerList) {
    const players = (state && state.players) || [];
    if (!players.length) {
      playerList.innerHTML = '<div style="font-size:10px;color:var(--text3);">Нет игроков</div>';
    } else {
      // data-player — безопасно для любых имён
      playerList.innerHTML = players.map(p =>
        `<div class="player-item">
          <span>${escHtmlAdmin(p)}</span>
          <button class="btn-remove" data-player="${escAttr(p)}" title="Удалить">✕</button>
        </div>`
      ).join('');
    }
  }

  // Счётчик
  const countEl = document.getElementById('admin-player-count');
  if (countEl) {
    const count = (state && state.players || []).length;
    const max = typeof MAX_PLAYERS !== 'undefined' ? MAX_PLAYERS : 30;
    countEl.textContent = count + ' / ' + max;
    countEl.style.color = count >= max ? 'var(--err)' : 'var(--text3)';
  }

  // Финальный стол
  const finalBtn = document.getElementById('btn-final-table');
  if (finalBtn && state) {
    finalBtn.textContent = state.finalTable ? '🏆 ФИНАЛ ВКЛ' : '🏆 Финальный стол';
    finalBtn.classList.toggle('active', !!state.finalTable);
  }
}

// Экранирование для HTML-контента
function escHtmlAdmin(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// Экранирование для HTML-атрибутов (data-player="...")
function escAttr(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}


// ── tv-tabs.js ──────────────────────────────
// ── TV TABS ────────────────────────────────────────────────────

const TV_TAB_LS_KEY = 'obshestvo_tv_last_tab';
const TV_LITE_LS_KEY = 'obshestvo_tv_lite_mode';

function showTVTab(name) {
  // Скрываем все вкладки
  document.querySelectorAll('.tv-tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tv-tab-btn').forEach(el => el.classList.remove('active'));

  // Показываем нужную
  const content = document.getElementById('tv-tab-' + name);
  const btn = document.querySelector('.tv-tab-btn[data-tab="' + name + '"]');
  if (content) content.classList.add('active');
  if (btn) btn.classList.add('active');

  // Запоминаем
  rememberLastTab(name);

  // При переключении на таймер — рендерим актуальное состояние
  if (name === 'timer') {
    const state = getTimerState();
    if (state) renderTimerTV(state);
  }
  if (name === 'seating') {
    const state = getSeatingState();
    if (state) renderSeatingTV(state);
  }
}

function rememberLastTab(name) {
  try { localStorage.setItem(TV_TAB_LS_KEY, name); } catch(e) {}
}

function restoreLastTab() {
  try {
    const last = localStorage.getItem(TV_TAB_LS_KEY);
    return last || 'seating';
  } catch(e) { return 'seating'; }
}

function toggleLiteMode() {
  const body = document.body;
  const isLite = body.classList.toggle('lite');
  try { localStorage.setItem(TV_LITE_LS_KEY, isLite ? '1' : ''); } catch(e) {}
  const btn = document.getElementById('btn-lite');
  if (btn) btn.textContent = isLite ? 'FULL' : 'LITE';
}

function restoreLiteMode() {
  try {
    if (localStorage.getItem(TV_LITE_LS_KEY)) {
      document.body.classList.add('lite');
      const btn = document.getElementById('btn-lite');
      if (btn) btn.textContent = 'FULL';
    }
  } catch(e) {}
}

// ── TV INIT ─────────────────────────────────────────────────
// TV = read-only. Только читает cloud. Никогда не пишет.

const TV_CLOUD_INTERVAL = 15000;
const TV_RENDER_INTERVAL = 1000;

// Подключаем статус-элементы
setTimerStatusElement(document.getElementById('tv-timer-status'));
setSeatingStatusElement(document.getElementById('tv-seating-status'));

// П.7: статус источника при старте
(function setInitialStatus() {
  const timerEl  = document.getElementById('tv-timer-status');
  const seatEl   = document.getElementById('tv-seating-status');
  if (!cloudIsEnabled()) {
    if (timerEl) { timerEl.textContent = '● ТАЙМЕР · ЛОКАЛЬНЫЙ ТЕСТ'; timerEl.dataset.status = 'local'; }
    if (seatEl)  { seatEl.textContent  = '● РАССАДКА · ЛОКАЛЬНЫЙ ТЕСТ'; seatEl.dataset.status = 'local'; }
  }
})();

// Инициализация — TV не writer (false)
initTimerEngine(false);
initSeatingEngine(false);

// Первый рендер из localStorage
renderTimerTV(getTimerState());
renderSeatingTV(getSeatingState());

// Рендер таймера каждую секунду (только рисует — не меняет state)
setInterval(function() {
  var state = getTimerState();
  if (state) renderTimerTV(state);
}, TV_RENDER_INTERVAL);

// Cloud sync — с jitter чтобы несколько TV не били одновременно
var jitter = Math.floor(Math.random() * 7000);
setTimeout(function() {
  syncFromCloud();
  setInterval(syncFromCloud, TV_CLOUD_INTERVAL);
}, jitter);

async function syncFromCloud() {
  // Синхронизируем всегда — и mock (localStorage), и реальный cloud.
  // При cloudEnabled:false cloudGet читает из localStorage mock,
  // что позволяет вкладкам видеть друг друга на одном компьютере.
  try {
    var results = await Promise.allSettled([
      loadCloudTimerState(),
      loadCloudSeatingState()
    ]);
    if (results[0].status === 'fulfilled' && results[0].value) {
      applyCloudTimerState(results[0].value);
    }
    if (results[1].status === 'fulfilled' && results[1].value) {
      applyCloudSeatingState(results[1].value);
    }
  } catch(e) {
    console.warn('[TV SYNC]', e.message);
  }
}

// Восстановить вкладку и lite-режим
restoreLiteMode();
showTVTab(restoreLastTab());
